<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas-Informes</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        if (localStorage.getItem('theme') === 'light') { document.documentElement.classList.remove('dark'); } 
        else { document.documentElement.classList.add('dark'); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { magenta: '#ec008c', magentaHover: '#c40074', black: '#111111', darkGray: '#333333', lightGray: '#999999', pinkBg: '#fdf2f8' }
                    },
                    fontFamily: { sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .card-hover { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .dark .card-hover:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        
        .tab-active { border-bottom-width: 2px; border-color: #ec008c; color: #ec008c; font-weight: 700; }
        
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; color: black !important; }
            .html2pdf__page-break { height: 0; page-break-before: always !important; margin: 0; padding: 0; border: none; }
            .shadow-sm, .shadow-xl { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tabla-excel th { position: sticky; top: 0; z-index: 10; outline: 1px solid #e2e8f0; }
        .dark .tabla-excel th { outline: 1px solid #334155; }
        .tabla-excel td { min-width: 100px; }
        
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-animate { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-brand-black dark:text-gray-100 pb-12 min-h-screen">

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 bg-brand-black dark:bg-white text-white dark:text-brand-black rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center border border-gray-700 dark:border-gray-200">
        <i id="theme-icon-light" class="fas fa-sun w-5 h-5 text-center hidden dark:block hover:rotate-45 transition-transform duration-500"></i>
        <i id="theme-icon-dark" class="fas fa-moon w-5 h-5 text-center block dark:hidden hover:-rotate-12 transition-transform duration-500"></i>
    </button>

    <header class="bg-white dark:bg-slate-900 shadow-sm print-hidden border-b border-gray-100 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <img src="logo.png" alt="Logo de la Empresa" class="h-12 object-contain bg-white/10 rounded-xl p-1" />
            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" id="btn-admin" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg transition shadow-sm font-bold text-sm border border-transparent">
                    <i class="fas fa-lock"></i> <span class="hidden sm:inline">Modo Lectura</span>
                </button>
                <div id="export-btn-container" style="display: none;">
                    <button onclick="exportarPDF()" class="flex items-center gap-2 bg-brand-black text-white px-4 py-2 rounded-lg hover:bg-brand-darkGray transition shadow-sm font-bold text-sm">
                        <i class="fas fa-file-pdf text-brand-magenta"></i> <span class="hidden sm:inline">Exportar PDF</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i class="fas fa-cloud text-lg"></i>
            </div>
            <div class="flex space-x-6 justify-center overflow-x-auto no-scrollbar" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold whitespace-nowrap"><i class="fas fa-chart-line"></i> Resumen</button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta flex items-center gap-2 font-bold whitespace-nowrap"><i class="fas fa-cash-register"></i> Carga Ventas</button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta flex items-center gap-2 font-bold whitespace-nowrap"><i class="fas fa-boxes"></i> Carga Stock</button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta flex items-center gap-2 font-bold whitespace-nowrap"><i class="fas fa-history"></i> Historial</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 md:pt-8" id="main-content"></main>

    <div id="custom-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm print-hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full mx-4 overflow-hidden modal-animate border border-gray-100 dark:border-slate-700">
            <div class="p-6">
                <div class="flex items-center gap-4 mb-4">
                    <div id="modal-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-xl shrink-0"></div>
                    <h3 id="modal-title" class="text-xl font-extrabold text-brand-black dark:text-white leading-tight"></h3>
                </div>
                <p id="modal-message" class="text-gray-600 dark:text-gray-300 mb-6 font-semibold whitespace-pre-line"></p>
                <div id="modal-password-container" class="hidden mb-6">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Contraseña de Autorización</label>
                    <input type="password" id="modal-password" class="w-full rounded-lg border border-pink-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-brand-black dark:text-white p-3 focus:ring-2 focus:ring-brand-magenta outline-none transition-all shadow-inner" placeholder="Ingresa la clave...">
                    <p id="modal-error" class="text-red-500 text-sm mt-2 font-bold hidden"><i class="fas fa-times-circle mr-1"></i> Contraseña incorrecta.</p>
                </div>
                <div class="flex justify-end gap-3">
                    <button id="modal-cancel" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors hidden shadow-sm">Cancelar</button>
                    <button id="modal-confirm" class="px-5 py-2.5 rounded-xl font-bold text-white transition-colors shadow-md"></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };

        let app, auth, db;
        try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } 
        catch(e) { console.error("Error Firebase:", e); }

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        
        let localActual = 'concordia';
        let anioActual = new Date().getFullYear().toString();
        let mesActual = null;
        let modoDiagnostico = 'mensual';

        let isAdmin = false; 
        const ADMIN_PIN = "1234"; 

        const PUNTOS_VENTA = { concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens', deposito: 'Depósito' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);
        const diasPorMes = { 'Enero': 31, 'Febrero': 28, 'Marzo': 31, 'Abril': 30, 'Mayo': 31, 'Junio': 30, 'Julio': 31, 'Agosto': 31, 'Septiembre': 30, 'Octubre': 31, 'Noviembre': 30, 'Diciembre': 31 };
        const horasDinamicas = [8, 9, 10, 11, 12, 17, 18, 19, 20, 21];
        
        const paleta = ['#ec008c', '#111111', '#666666', '#f472b6', '#333333', '#8b5cf6', '#14b8a6', '#6366f1', '#f59e0b', '#10b981', '#06b6d4', '#f43f5e'];

        let formState = {
            mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '',
            unidades: '', stock: [{ categoria: '', cantidad: '', valor: '' }],
            isEditingVentas: false, isEditingStock: false
        };

        window.toggleTheme = () => {
            const html = document.documentElement; html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            render(); 
        };

        function showModal({ type, title, message, iconClass, iconBg, confirmText, confirmClass, onConfirm }) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const iconEl = document.getElementById('modal-icon');
            iconEl.className = `w-12 h-12 rounded-full flex items-center justify-center text-xl shrink-0 ${iconBg}`;
            iconEl.innerHTML = `<i class="${iconClass}"></i>`;

            const passContainer = document.getElementById('modal-password-container');
            const passInput = document.getElementById('modal-password');
            const errorEl = document.getElementById('modal-error');
            const cancelBtn = document.getElementById('modal-cancel');
            const confirmBtn = document.getElementById('modal-confirm');

            passInput.value = ''; errorEl.classList.add('hidden');
            const newConfirmBtn = confirmBtn.cloneNode(true); confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            const newCancelBtn = cancelBtn.cloneNode(true); cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

            newConfirmBtn.innerText = confirmText || 'Aceptar';
            newConfirmBtn.className = `px-5 py-2.5 rounded-xl font-bold text-white transition-colors shadow-md ${confirmClass || 'bg-brand-magenta hover:bg-brand-magentaHover'}`;

            if (type === 'password') {
                passContainer.classList.remove('hidden'); newCancelBtn.classList.remove('hidden');
                const processPass = () => {
                    if (passInput.value === ADMIN_PIN) { modal.classList.add('hidden'); if(onConfirm) onConfirm(); } 
                    else { errorEl.classList.remove('hidden'); }
                };
                newConfirmBtn.onclick = processPass; passInput.onkeydown = (e) => { if(e.key==='Enter') processPass(); };
                newCancelBtn.onclick = () => modal.classList.add('hidden');
            } else if (type === 'confirm') {
                passContainer.classList.add('hidden'); newCancelBtn.classList.remove('hidden');
                newConfirmBtn.onclick = () => { modal.classList.add('hidden'); if(onConfirm) onConfirm(); };
                newCancelBtn.onclick = () => modal.classList.add('hidden');
            } else if (type === 'alert') {
                passContainer.classList.add('hidden'); newCancelBtn.classList.add('hidden');
                newConfirmBtn.onclick = () => { modal.classList.add('hidden'); if(onConfirm) onConfirm(); };
            }
            modal.classList.remove('hidden');
            if (type === 'password') setTimeout(() => passInput.focus(), 100);
        }

        window.toggleAdmin = () => {
            if (isAdmin) { isAdmin = false; if (activeTab === 'cargaVentas' || activeTab === 'cargaStock') activeTab = 'dashboard'; render(); }
            else { showModal({ type: 'password', title: 'Acceso Restringido', message: 'Ingresa la contraseña de administrador para habilitar la edición.', iconClass: 'fas fa-lock text-brand-magenta', iconBg: 'bg-pink-100 dark:bg-pink-900/30', confirmText: 'Desbloquear', onConfirm: () => { isAdmin = true; render(); } }); }
        };

        if (auth) {
            signInAnonymously(auth).catch(console.error);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i class="fas fa-cloud text-emerald-500"></i>';
                    onSnapshot(collection(db, 'registros_mensuales'), (snapshot) => {
                        appData = [];
                        snapshot.forEach(doc => { appData.push({ dbId: doc.id, ...doc.data() }); });
                        render();
                    });
                } else {
                    statusEl.innerHTML = '<i class="fas fa-cloud text-red-500"></i>';
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 2 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('es-AR').format(val || 0);
        const formatMillones = (val) => isNaN(val) ? '$0M' : '$' + (val / 1000000).toFixed(1) + 'M';

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(','); const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        function esBisiesto(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }

        window.switchTab = (tab) => { activeTab = tab; render(); };
        window.cambiarDashLocal = (val) => { localActual = val; mesActual = null; render(); };
        window.cambiarDashAnio = (val) => { anioActual = val; mesActual = null; render(); };
        window.cambiarDashMes = (val) => { mesActual = val; render(); };

        window.handleFormChange = (field, value) => { 
            formState[field] = value; 
            if (field === 'puntoVenta' || field === 'mes' || field === 'año') {
                formState.isEditingVentas = false; formState.isEditingStock = false;
                if (activeTab === 'cargaVentas') window.cambiarMesGrilla();
                if (activeTab === 'cargaStock') window.renderFormStockRows();
                render(); 
            }
        };

        window.cambiarTipoDia = function(dia, selectElement) {
            const tr = selectElement.closest('tr');
            if (selectElement.value !== 'normal') tr.classList.add('bg-gray-100', 'dark:bg-slate-800');
            else tr.classList.remove('bg-gray-100', 'dark:bg-slate-800');
        };

        window.cambiarMesGrilla = function() {
            let numDias = diasPorMes[formState.mes] || 31;
            if (formState.mes === 'Febrero' && esBisiesto(parseInt(formState.año))) numDias = 29;
            const tbody = document.getElementById('tbody-grilla');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            const existingData = appData.find(d => d.dbId === docId);

            for(let i=1; i<=numDias; i++) {
                let tipoDiaVal = (formState.isEditingVentas && existingData?.tiposDia?.[i]) ? existingData.tiposDia[i] : 'normal';
                let opacityClass = tipoDiaVal !== 'normal' ? 'bg-gray-100 dark:bg-slate-800' : '';

                let tr = document.createElement('tr');
                tr.className = `border-b border-gray-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors ${opacityClass}`;
                
                let tdDia = `
                    <td class="p-2 font-bold text-center border-r border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 sticky left-0 z-10">
                        <div class="mb-1 text-xs text-brand-black dark:text-white">Día ${i}</div>
                        <select id="tipo_dia_${i}" onchange="cambiarTipoDia(${i}, this)" class="text-[10px] p-1 border border-gray-300 dark:border-slate-600 rounded w-full focus:ring-1 focus:ring-brand-magenta outline-none bg-gray-50 dark:bg-slate-700 text-gray-600 dark:text-gray-300 font-semibold cursor-pointer">
                            <option value="normal" ${tipoDiaVal==='normal'?'selected':''}>Normal</option>
                            <option value="domingo" ${tipoDiaVal==='domingo'?'selected':''}>Domingo</option>
                            <option value="feriado" ${tipoDiaVal==='feriado'?'selected':''}>Feriado</option>
                        </select>
                    </td>`;
                    
                let tdHoras = '';
                horasDinamicas.forEach(h => {
                    let colorFondo = h <= 12 ? 'bg-amber-50/50 dark:bg-amber-900/10' : 'bg-brand-light/50 dark:bg-brand-magenta/10';
                    let vVal = (formState.isEditingVentas && existingData?.grillaDiaria?.[i]?.[h]) ? existingData.grillaDiaria[i][h].v : '';
                    let tVal = (formState.isEditingVentas && existingData?.grillaDiaria?.[i]?.[h]) ? existingData.grillaDiaria[i][h].t : '';
                    
                    tdHoras += `
                    <td class="p-1 border-r border-gray-100 dark:border-slate-800 ${colorFondo}">
                        <input type="text" id="v_${i}_${h}" class="w-full text-[10px] p-1.5 mb-1 border border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-brand-black dark:text-white rounded text-center focus:ring-1 focus:ring-brand-magenta outline-none" placeholder="$ Venta" value="${vVal}">
                        <input type="text" id="t_${i}_${h}" class="w-full text-[10px] p-1.5 border border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-brand-black dark:text-white rounded text-center focus:ring-1 focus:ring-brand-magenta outline-none" placeholder="Tkts" value="${tVal}">
                    </td>`;
                });
                tr.innerHTML = tdDia + tdHoras;
                tbody.appendChild(tr);
            }
        };

        window.habilitarEdicionVentas = () => {
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            const cur = appData.find(d => d.dbId === docId);
            if(cur) {
                formState.cotizacionDolar = cur.cotizacionDolar || '';
                formState.unidades = cur.productosVendidos || '';
            }
            formState.isEditingVentas = true;
            render();
            window.cambiarMesGrilla();
        };

        window.handleStockChange = (idx, field, val) => { 
            formState.stock[idx][field] = val; 
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formState.stock.push({ categoria: '', cantidad: '', valor: '' }); window.renderFormStockRows(); };
        window.removeStockRow = (idx) => { formState.stock.splice(idx, 1); window.renderFormStockRows(); };

        window.habilitarEdicionStock = () => {
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            const cur = appData.find(d => d.dbId === docId);
            if(cur && cur.stock) {
                formState.cotizacionDolar = cur.cotizacionDolar || '';
                formState.stock = cur.stock.map(s => ({...s}));
            }
            formState.isEditingStock = true;
            render();
        };

        window.mostrarDiagnosticoAnual = function() { modoDiagnostico = 'anual'; render(); };
        window.mostrarDiagnosticoMensual = function() { modoDiagnostico = 'mensual'; render(); };
        window.guardarDiagnostico = async (texto) => {
            if (!currentUser || !mesActual) return;
            const docId = `${mesActual}-${anioActual}-${localActual}`;
            await setDoc(doc(db, 'registros_mensuales', docId), { diagnosticoExtendido: texto }, { merge: true });
        };

        window.submitGenericForm = async (e, type) => {
            e.preventDefault();
            if (!currentUser) return;
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            
            let dataToSave = { mes: formState.mes, año: formState.año, puntoVenta: formState.puntoVenta, cotizacionDolar: window.parseInputNumber(formState.cotizacionDolar) || 1 };
            
            if (type === 'ventas') {
                let ventasTotales = 0, ventasManana = 0, ventasTarde = 0;
                let ticketsTotales = 0, ticketsManana = 0, ticketsTarde = 0;
                let grillaDiaria = {}; let tiposDia = {}; let diasOperativos = 0;
                let hayDatosEnGrilla = false;
                
                let numDias = diasPorMes[formState.mes] || 31;
                if (formState.mes === 'Febrero' && esBisiesto(parseInt(formState.año))) numDias = 29;

                for(let i=1; i<=numDias; i++) {
                    let elTipo = document.getElementById(`tipo_dia_${i}`);
                    let tipo = elTipo ? elTipo.value : 'normal';
                    tiposDia[i] = tipo;
                    
                    let datosDia = {}; let diaTieneDatos = false; let ventaDia = 0;
                    horasDinamicas.forEach(h => {
                        let valV = window.parseInputNumber(document.getElementById(`v_${i}_${h}`)?.value);
                        let valT = window.parseInputNumber(document.getElementById(`t_${i}_${h}`)?.value);
                        if(valV > 0 || valT > 0) {
                            diaTieneDatos = true; hayDatosEnGrilla = true; 
                            datosDia[h] = { v: valV, t: valT };
                            ventasTotales += valV; ticketsTotales += valT; ventaDia += valV;

                        }

                main.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden animate-in fade-in"><div class="p-6 border-b border-gray-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 font-bold uppercase text-xs tracking-widest text-brand-gray flex items-center"><i class="fas fa-database mr-2"></i> Auditoría Histórica</div><div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="bg-white dark:bg-slate-900 text-brand-gray border-b border-gray-100 dark:border-slate-800"><th class="p-5">Período</th><th class="p-5">Punto Venta</th><th class="p-5 text-right">Venta Total</th><th class="p-5 text-right">Capital Total</th>${isAdmin ? `<th class="p-5 text-center">Acción</th>` : ''}</tr></thead><tbody>${appData.slice().sort((a,b) => { if (a.año !== b.año) return Number(b.año) - Number(a.año); if (monthOrder[a.mes] !== monthOrder[b.mes]) return monthOrder[b.mes] - monthOrder[a.mes]; return a.puntoVenta.localeCompare(b.puntoVenta); }).map(r=>`<tr class="border-b border-gray-50 dark:border-slate-800 hover:bg-brand-light dark:hover:bg-slate-800 transition-colors"><td class="p-5 font-black text-brand-black dark:text-white">${r.mes} ${r.año}</td><td class="p-5 text-brand-gray dark:text-gray-300 font-bold">${PUNTOS_VENTA[r.puntoVenta]}</td><td class="p-5 text-right font-black text-brand-magenta">${r.isVentasLoaded ? formatCurrency(r.ventas) : '-'}</td><td class="p-5 text-right font-black text-brand-black dark:text-gray-300">${r.isStockLoaded ? formatCurrency(r.valorMercaderia) : '-'}</td>${isAdmin ? `<td class="p-5 text-center"><button onclick="deleteRecord('${r.dbId}')" class="p-2 text-brand-gray hover:bg-red-50 hover:text-red-500 rounded-lg transition-colors"><i class="fas fa-trash-alt"></i></button></td>` : ''}</tr>`).join('')}</tbody></table></div></div>`;
            }
        }

        render();
    </script>
</body>
</html>
