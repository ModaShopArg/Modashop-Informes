<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas-Informes</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            magenta: '#EC008C', 
                            black: '#1D1D1B',   
                            gray: '#878787',    
                            light: '#fdf2f8'    
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; color: black !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
        body, div, header, nav, button, p, h2, h3, h4, span, td, th { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        
        .tab-active { border-bottom-width: 2px; border-color: #EC008C; color: #EC008C; font-weight: 700; }
        .dark .tab-active { border-color: #EC008C; color: #EC008C; }
        
        .subtab-active { background-color: #EC008C; color: #ffffff; border-color: #EC008C; }
        .dark .subtab-active { background-color: #EC008C; color: #ffffff; border-color: #EC008C; }
        
        .month-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .month-card:hover { transform: translateY(-2px); border-color: #e2e8f0; }
        .dark .month-card:hover { border-color: #334155; }
        .month-card.active { border-color: #EC008C; background-color: #fdf2f8; box-shadow: 0 10px 15px -3px rgba(236, 0, 140, 0.1); }
        .dark .month-card.active { border-color: #EC008C; background-color: rgba(236, 0, 140, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        .empty-chart-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(241,245,249,0.85); color: #878787; font-size: 0.75rem; font-weight: 700; border-radius: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; pointer-events: none; z-index: 10; }
        .dark .empty-chart-overlay { background: rgba(15, 23, 42, 0.85); color: #878787; }
        
        /* Estilos Grilla */
        .tabla-excel th { position: sticky; top: 0; z-index: 10; outline: 1px solid #e2e8f0; }
        .dark .tabla-excel th { outline: 1px solid #334155; }
        .tabla-excel td { min-width: 100px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-brand-black dark:text-gray-100 pb-12 min-h-screen">

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 bg-brand-black dark:bg-white text-white dark:text-brand-black rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center group border border-gray-700 dark:border-gray-200">
        <i id="theme-icon-light" data-lucide="sun" class="w-6 h-6 hidden dark:block group-hover:rotate-45 transition-transform duration-500"></i>
        <i id="theme-icon-dark" data-lucide="moon" class="w-6 h-6 block dark:hidden group-hover:-rotate-12 transition-transform duration-500"></i>
    </button>

    <header class="bg-white dark:bg-slate-900 shadow-sm print-hidden border-b border-gray-100 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between relative">
            <img src="logo.png" alt="Logo de la Empresa" class="h-16 object-contain bg-white/10 rounded-xl p-1" />
            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" id="btn-admin" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm font-bold text-sm">
                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>
                </button>
                <div id="export-btn-container" style="display: none;">
                    <button onclick="window.print()" class="flex items-center gap-2 bg-brand-black text-white px-4 py-2 rounded-lg hover:bg-black transition shadow-sm font-bold text-sm">
                        <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline">Exportar PDF</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>
            <div class="flex space-x-6 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen
                </button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Carga Ventas
                </button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="package" class="w-4 h-4"></i> Carga Stock
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="store" class="w-4 h-4"></i> Historial
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==============================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };
        // ==============================================================================

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { console.error(e); }

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        let dashboardSubTab = 'capital'; // Por defecto
        
        let isAdmin = false; 
        const ADMIN_PIN = "292708"; 
        let chartInstances = {}; 

        // Filtros Dashboard Globales
        let dashboardLocal = 'concordia';
        let dashboardAnio = new Date().getFullYear().toString();
        let dashboardMes = null;

        const PUNTOS_VENTA = { concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens', deposito: 'Depósito' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);
        const diasPorMes = { 'Enero': 31, 'Febrero': 28, 'Marzo': 31, 'Abril': 30, 'Mayo': 31, 'Junio': 30, 'Julio': 31, 'Agosto': 31, 'Septiembre': 30, 'Octubre': 31, 'Noviembre': 30, 'Diciembre': 31 };
        const horasDinamicas = [8, 9, 10, 11, 12, 17, 18, 19, 20, 21];

        const brandPalette = ['#EC008C', '#1D1D1B', '#878787', '#f472b6', '#334155', '#6366f1', '#14b8a6', '#f59e0b', '#10b981', '#06b6d4', '#8b5cf6', '#f43f5e'];

        const eventosComerciales = {
            'Enero': 'Febrero (San Valentín y Feriado de Carnaval)',
            'Febrero': 'Marzo (Día de la Mujer y Temp. Otoño/Invierno)',
            'Marzo': 'Abril (Pascuas y Media Temporada)',
            'Abril': 'Mayo (Hot Sale ARG y Feriados Nacionales)',
            'Mayo': 'Junio (Día del Padre e Inicio de Invierno)',
            'Junio': 'Julio (Día del Amigo y Liq. Invierno)',
            'Julio': 'Agosto (Día de las Infancias)',
            'Agosto': 'Septiembre (Día de la Primavera y Temp. Prim/Verano)',
            'Septiembre': 'Octubre (Día de la Madre y Halloween)',
            'Octubre': 'Noviembre (Cyber Monday y Black Friday)',
            'Noviembre': 'Diciembre (Navidad y Año Nuevo)',
            'Diciembre': 'Enero (Reyes Magos y Liq. de Verano)'
        };

        function esBisiesto(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }

        window.toggleTheme = () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            render(); 
        };

        window.toggleAdmin = () => {
            if (isAdmin) { isAdmin = false; if (activeTab === 'cargaVentas' || activeTab === 'cargaStock') activeTab = 'dashboard'; render(); }
            else {
                const pin = prompt("🔐 MODO SEGURO ACTIVO\n\nIngresa el PIN para habilitar la edición:");
                if (pin === ADMIN_PIN) { isAdmin = true; render(); }
                else if (pin !== null) alert("❌ PIN incorrecto.");
            }
        };

        if (auth) {
            signInAnonymously(auth).catch(console.error);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1";
                    lucide.createIcons();
                    
                    onSnapshot(collection(db, 'registros_mensuales'), (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => { appData.push({ dbId: documento.id, ...documento.data() }); });
                        render();
                    });
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('es-AR').format(val || 0);
        const formatMillones = (val) => isNaN(val) ? '$0M' : '$' + (val / 1000000).toFixed(1) + 'M';

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };
        window.switchDashboardSubTab = (sub) => { dashboardSubTab = sub; render(); };
        
        window.cambiarDashFiltro = (campo, val) => { 
            if(campo === 'local') dashboardLocal = val;
            if(campo === 'anio') dashboardAnio = val;
            dashboardMes = null; 
            render(); 
        };
        window.cambiarDashMes = (val) => { dashboardMes = val; render(); };

        let formVentas = { mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', unidades: '' };
        let formStock = { mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '', stock: [{ categoria: '', cantidad: '', valor: '' }] };

        window.handleVentasForm = (field, val) => { formVentas[field] = val; if(field==='mes' || field==='año' || field==='puntoVenta') render(); };
        window.handleStockForm = (field, val) => { formStock[field] = val; if(field==='mes' || field==='año' || field==='puntoVenta') render(); };
        
        window.handleStockChange = (idx, field, val) => { 
            formStock.stock[idx][field] = val; 
            const suma = formStock.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formStock.stock.push({ categoria: '', cantidad: '', valor: '' }); render(); };
        window.removeStockRow = (idx) => { formStock.stock.splice(idx, 1); render(); };

        window.cambiarTipoDia = function(dia, selectElement) {
            const tr = selectElement.closest('tr');
            if (selectElement.value !== 'normal') { tr.classList.add('bg-gray-100', 'dark:bg-slate-800'); } 
            else { tr.classList.remove('bg-gray-100', 'dark:bg-slate-800'); }
        };

        // --- SISTEMA DE GUARDADO ---
        window.submitVentasForm = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            let ventas = 0, ventasManana = 0, tickets = 0, ticketsManana = 0, diasOperativos = 0;
            let grillaDiaria = {}; let tiposDia = {};
            
            let numDias = diasPorMes[formVentas.mes] || 31;
            if (formVentas.mes === 'Febrero' && esBisiesto(parseInt(formVentas.año))) numDias = 29;

            for(let i=1; i<=numDias; i++) {
                let elTipo = document.getElementById(`tipo_dia_${i}`);
                let tipo = elTipo ? elTipo.value : 'normal';
                tiposDia[i] = tipo;
                
                let datosDia = {}; let diaTieneDatos = false; let ventaDia = 0;
                horasDinamicas.forEach(h => {
                    let v = window.parseInputNumber(document.getElementById(`v_${i}_${h}`)?.value);
                    let t = window.parseInputNumber(document.getElementById(`t_${i}_${h}`)?.value);
                    if(v>0 || t>0) {
                        diaTieneDatos = true; datosDia[h] = {v, t};
                        ventas += v; tickets += t; ventaDia += v;
                        if(h <= 12) { ventasManana += v; ticketsManana += t; }
                    }
                });
                if(diaTieneDatos) grillaDiaria[i] = datosDia;
                if(tipo === 'normal' || ventaDia > 0) diasOperativos++;
            }

            if (ventas === 0 && tickets === 0) { alert('Debes cargar información en la grilla.'); return; }

            const docId = `${formVentas.mes}-${formVentas.año}-${formVentas.puntoVenta}`;
            let dataToSave = { 
                mes: formVentas.mes, año: formVentas.año, puntoVenta: formVentas.puntoVenta, 
                isVentasLoaded: true, ventas, ventasManana, tickets, ticketsManana, 
                productosVendidos: window.parseInputNumber(formVentas.unidades), 
                grillaDiaria, tiposDia, diasOperativos 
            };
            
            await setDoc(doc(db, 'registros_mensuales', docId), dataToSave, { merge: true });
            
            dashboardLocal = formVentas.puntoVenta;
            dashboardAnio = formVentas.año;
            dashboardMes = formVentas.mes;
            formVentas.unidades = '';
            window.switchTab('dashboard');
        };

        window.submitStockForm = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const docId = `${formStock.mes}-${formStock.año}-${formStock.puntoVenta}`;
            const stockLimpio = formStock.stock.filter(s => s.categoria).map(s => ({ categoria: s.categoria, cantidad: window.parseInputNumber(s.cantidad), valor: window.parseInputNumber(s.valor) }));
            let dataToSave = { 
                mes: formStock.mes, año: formStock.año, puntoVenta: formStock.puntoVenta, 
                cotizacionDolar: window.parseInputNumber(formStock.cotizacionDolar) || 1, 
                isStockLoaded: true, stock: stockLimpio, valorMercaderia: stockLimpio.reduce((acc, item) => acc + item.valor, 0) 
            };
            await setDoc(doc(db, 'registros_mensuales', docId), dataToSave, { merge: true });
            formStock.stock = [{ categoria: '', cantidad: '', valor: '' }];
            window.switchTab('historial');
        };

        window.deleteRecord = async (dbId) => { if(confirm('¿Eliminar registro histórico?')) await deleteDoc(doc(db, 'registros_mensuales', dbId)); };

        // --- DIAGNÓSTICOS DE TEXTO ---
        function generarTextoDiagnosticoComercial(dataMes, dataAnio) {
            if (!dataMes || !dataMes.isVentasLoaded) return { mensual: "Faltan datos de ventas para el diagnóstico mensual.", anual: "Faltan datos de ventas." };
            
            const ventasTarde = dataMes.ventas - (dataMes.ventasManana || 0);
            const turnoFuerte = ventasTarde > (dataMes.ventasManana || 0) ? 'Tarde' : 'Mañana';
            const pctTurno = dataMes.ventas > 0 ? ((Math.max(ventasTarde, (dataMes.ventasManana || 0)) / dataMes.ventas) * 100).toFixed(1) : 0;
            const diasTrabajados = dataMes.diasOperativos || 30;
            
            let maxVDia = -1; let maxDia = "S/D";
            let maxVHora = -1; let maxHora = "S/D";
            let minVHora = Infinity; let valleHora = "S/D";
            
            if (dataMes.grillaDiaria) {
                for(let i=1; i<=31; i++) {
                    if(dataMes.grillaDiaria[i]) {
                        let sumaVentaDia = 0;
                        horasDinamicas.forEach((h) => { sumaVentaDia += (dataMes.grillaDiaria[i][h]?.v || 0); });
                        if (sumaVentaDia > maxVDia) { maxVDia = sumaVentaDia; maxDia = `Día ${i}`; }
                    }
                }
                horasDinamicas.forEach((h) => {
                    let sumHora = 0;
                    for(let i=1; i<=31; i++) { if(dataMes.grillaDiaria[i]) sumHora += (dataMes.grillaDiaria[i][h]?.v || 0); }
                    if (sumHora > maxVHora) { maxVHora = sumHora; maxHora = `${String(h).padStart(2, '0')}:00`; }
                    if (h !== 21 && h !== 12 && sumHora < minVHora && sumHora > 0) { minVHora = sumHora; valleHora = `${String(h).padStart(2, '0')}:00`; }
                });
            }
            if (minVHora === Infinity) valleHora = maxHora;

            const upt = dataMes.tickets > 0 ? (dataMes.productosVendidos / dataMes.tickets).toFixed(2) : 0;
            const alertaProximoMes = eventosComerciales[dataMes.mes] ? `\n\n🎯 ALERTA COMERCIAL: Falta 1 mes para ${eventosComerciales[dataMes.mes]}. Ideal para planificar stock y marketing.` : '';
            
            let txtMensual = `Durante el mes de ${dataMes.mes} ${dashboardAnio} (${diasTrabajados} días laborables computados), el Local ${PUNTOS_VENTA[dashboardLocal]} registró una facturación total de ${formatCurrency(dataMes.ventas)}. El ticket promedio mensual se ubicó en ${formatCurrency(dataMes.ventas/(dataMes.tickets||1))} con un nivel de venta cruzada (UPT) de ${upt} artículos por cliente.\n\n📌 ANÁLISIS OPERATIVO:\nEl turno ${turnoFuerte} lideró la tracción de ingresos con el ${pctTurno}% de las ventas totales. El mejor día comercial fue el ${maxDia} (${formatCurrency(maxVDia)}).\n\nEvaluando el mapa de calor horario del mes, la "Zona Caliente" de mayor conversión se dio a las ${maxHora} hs, mientras que el "Valle Operativo" más profundo fue a las ${valleHora} hs. Se recomienda enfocar los esfuerzos de reposición en el horario valle y asegurar máxima cobertura de staff en la hora pico.${alertaProximoMes}`;

            let sumVentas = 0; let sumTickets = 0; let sumUnidades = 0; let sumDiasTrabajados = 0;
            dataAnio.forEach(d => { if(d.isVentasLoaded) { sumVentas += (d.ventas||0); sumTickets += (d.tickets||0); sumUnidades += (d.productosVendidos||0); sumDiasTrabajados += (d.diasOperativos || 30); }});
            let uptAnual = sumTickets > 0 ? (sumUnidades / sumTickets).toFixed(2) : 0;
            
            let txtAnual = `En el acumulado del año ${dashboardAnio} (${sumDiasTrabajados} días laborables computados), el Local ${PUNTOS_VENTA[dashboardLocal]} registra una facturación global de ${formatCurrency(sumVentas)}. \n\nEl volumen total de tráfico alcanzó los ${formatNumber(sumTickets)} tickets, manteniendo un Ticket Promedio anual de ${formatCurrency(sumVentas/(sumTickets||1))} y una eficiencia operativa consolidada de ${uptAnual} unidades por cliente.`;

            return { mensual: txtMensual, anual: txtAnual };
        }

        // --- SISTEMA DE RENDERIZADO PRINCIPAL ---
        function render() {
            const main = document.getElementById('main-content');
            const nav = ['dashboard', 'cargaVentas', 'cargaStock', 'historial'];
            
            const tabVentas = document.getElementById('tab-cargaVentas');

                cont.innerHTML = stockToRender.map((item, idx) => `
                    <div class="flex gap-2 items-center">
                        <div class="flex-[2]"><input type="text" placeholder="Rubro Ej: Carteras" class="w-full p-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta font-bold ${opacityClass}" value="${item.categoria}" onchange="handleStockChange(${idx}, 'categoria', this.value)" required ${disabledAttr} /></div>
                        <div class="flex-1"><input type="text" placeholder="Cant." class="w-full p-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-center text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta font-bold ${opacityClass}" value="${item.cantidad}" onchange="handleStockChange(${idx}, 'cantidad', this.value)" required ${disabledAttr}/></div>
                        <div class="flex-[1.5] relative"><span class="absolute left-3 top-2.5 text-gray-400 font-bold">$</span><input type="text" placeholder="Total" class="w-full pl-7 p-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-sm font-bold text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta ${opacityClass}" value="${item.valor}" onchange="handleStockChange(${idx}, 'valor', this.value)" required ${disabledAttr}/></div>
                        ${stockToRender.length > 1 ? `<button type="button" onclick="removeStockRow(${idx})" class="p-2 text-red-400 hover:text-brand-magenta transition ${opacityClass}" ${disabledAttr}><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : '<div class="w-9"></div>'}
                    </div>
                `).join('');
                lucide.createIcons();

            } else {
                document.getElementById('export-btn-container').style.display = 'none';
                main.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden animate-in fade-in">
                        <div class="p-6 border-b border-gray-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 font-bold uppercase text-xs tracking-widest text-brand-gray flex items-center">
                            <i data-lucide="database" class="mr-2 w-4 h-4"></i> Auditoría Histórica
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead>
                                    <tr class="bg-white dark:bg-slate-900 text-brand-gray border-b border-gray-100 dark:border-slate-800">
                                        <th class="p-5">Período</th>
                                        <th class="p-5">Punto Venta</th>
                                        <th class="p-5 text-right">Venta Total</th>
                                        <th class="p-5 text-right">Capital Total</th>
                                        ${isAdmin ? `<th class="p-5 text-center">Acción</th>` : ''}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${appData.slice().sort((a,b) => {
                                        if (a.año !== b.año) return Number(b.año) - Number(a.año);
                                        if (monthOrder[a.mes] !== monthOrder[b.mes]) return monthOrder[b.mes] - monthOrder[a.mes];
                                        return a.puntoVenta.localeCompare(b.puntoVenta);
                                    }).map(r=>`
                                    <tr class="border-b border-gray-50 dark:border-slate-800 hover:bg-brand-light dark:hover:bg-slate-800 transition-colors">
                                        <td class="p-5 font-black text-brand-black dark:text-white">${r.mes} ${r.año}</td>
                                        <td class="p-5 text-brand-gray dark:text-gray-300 font-bold">${PUNTOS_VENTA[r.puntoVenta] || r.puntoVenta}</td>
                                        <td class="p-5 text-right font-black text-brand-magenta">${r.isVentasLoaded || typeof r.ventas === 'number' ? formatCurrency(r.ventas) : '-'}</td>
                                        <td class="p-5 text-right font-black text-brand-black dark:text-gray-300">${r.isStockLoaded || typeof r.valorMercaderia === 'number' ? formatCurrency(r.valorMercaderia) : '-'}</td>
                                        ${isAdmin ? `<td class="p-5 text-center"><button onclick="deleteRecord('${r.dbId}')" class="p-2 text-brand-gray hover:bg-red-50 hover:text-red-500 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button></td>` : ''}
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        window.editarRegistroActual = function(tipo) {
            let docId, formId, submitBtnId;
            if (tipo === 'ventas') { docId = `${formVentas.mes}-${formVentas.año}-${formVentas.puntoVenta}`; formId = 'form-carga-ventas'; submitBtnId = 'btn-submit-ventas'; } 
            else { docId = `${formStock.mes}-${formStock.año}-${formStock.puntoVenta}`; formId = 'form-carga-stock'; submitBtnId = 'btn-submit-stock'; }
            
            const currentRec = appData.find(d => d.dbId === docId);
            if(currentRec) {
                if (tipo === 'stock' && currentRec.stock) formStock.stock = currentRec.stock.map(s => ({...s}));
                const selectores = document.querySelectorAll(`#${formId} select:not([id^="tipo_dia_"]), #${formId} input, #${formId} button`);
                selectores.forEach(el => { el.disabled = false; el.classList.remove('opacity-50', 'cursor-not-allowed'); });
                document.getElementById(submitBtnId).innerHTML = `<i data-lucide="save" class="w-5 h-5 mr-2"></i> Actualizar Registro`;
                lucide.createIcons();
            }
        };

        window.toggleDiagModo = function() {
            const el = document.getElementById('texto-diagnostico');
            const btn = document.getElementById('btnToggleDiag');
            const sub = document.getElementById('diag-subtitle');
            
            let datosAnioGlobal = appData.filter(d => d.año === dashboardAnio).sort((a, b) => monthOrder[a.mes] - monthOrder[b.mes]);
            let datosLocalAnio = datosAnioGlobal.filter(d => d.puntoVenta === dashboardLocal && d.isVentasLoaded);
            const dMes = datosLocalAnio.find(d=>d.mes===dashboardMes) || datosLocalAnio[datosLocalAnio.length-1];

            if (!dMes) return;
            const diagData = generarTextoDiagnosticoComercial(dMes, datosLocalAnio);

            if (btn.innerText.includes('Anual')) {
                el.innerText = diagData.anual;
                btn.innerText = 'Ver Resumen Mensual';
                sub.innerText = `(Acumulado ${dashboardAnio})`;
            } else {
                el.innerText = diagData.mensual;
                btn.innerText = 'Ver Resumen Anual';
                sub.innerText = `(${dashboardMes})`;
            }
        };

        function initChartsDashboard(dataAnioGlobal, mesSeleccionado) {
            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? '#334155' : '#e2e8f0';
            const textColor = isDark ? '#878787' : '#878787';

            Chart.defaults.color = textColor;
            Chart.defaults.scale.grid.color = gridColor;
            Chart.defaults.scale.ticks.color = textColor;
            Chart.defaults.font.family = "'Nunito', sans-serif";

            Object.keys(chartInstances).forEach(k => { if(chartInstances[k]) chartInstances[k].destroy(); });
            chartInstances = {};

            const cCfg = (id, type, data, options) => { const ctx = document.getElementById(id); if (ctx) chartInstances[id] = new Chart(ctx.getContext('2d'), { type, data, options }); };
            
            const showComercial = dashboardSubTab === 'comercial' || dashboardSubTab === 'completo';
            const showCapital = dashboardSubTab === 'capital' || dashboardSubTab === 'completo';

            // --- GRÁFICOS GLOBALES CAPITAL ---
            if (showCapital) {
                const mesesData = [...new Set(dataAnioGlobal.filter(d=>d.isStockLoaded || d.valorMercaderia>0).map(d=>d.mes))];
                if (document.getElementById('chartYoyCapital')) {
                    const capYoy = mesesData.map(m => dataAnioGlobal.filter(d => d.mes === m).reduce((a,c) => a + (c.valorMercaderia||0), 0));
                    cCfg('chartYoyCapital', 'line', { labels: mesesData, datasets: [{ label: 'Capital Global ($)', data: capYoy, borderColor: '#8b5cf6', backgroundColor: isDark ? 'rgba(139,92,246,0.1)' : 'rgba(139,92,246,0.2)', fill: true, tension: 0.3, borderWidth: 3, pointBackgroundColor: '#8b5cf6' }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatMillones } } } });
                }
                
                const dMesG = dataAnioGlobal.filter(d=>d.mes===mesesData[mesesData.length-1]);
                if (document.getElementById('chartCapitalMix')) {
                    const capPorLocal = {};
                    dMesG.forEach(d => capPorLocal[PUNTOS_VENTA[d.puntoVenta]] = (d.valorMercaderia||0));
                    cCfg('chartCapitalMix', 'doughnut', { labels: Object.keys(capPorLocal), datasets: [{ data: Object.values(capPorLocal), backgroundColor: brandPalette, borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                }
                
                const capCat = {};
                dMesG.forEach(d => { if(d.stock) d.stock.forEach(s => { if(!capCat[s.categoria]) capCat[s.categoria]={v:0,c:0}; capCat[s.categoria].v+=s.valor; capCat[s.categoria].c+=s.cantidad; }); });
                const topCat = Object.keys(capCat).map(k=>({cat:k, val:capCat[k].v, avg: capCat[k].c>0?capCat[k].v/capCat[k].c:0})).sort((a,b)=>b.val-a.val);
                
                if (document.getElementById('chartCapitalCat')) {
                    cCfg('chartCapitalCat', 'bar', { labels: topCat.map(c=>c.cat), datasets: [{ label: 'Capital ($)', data: topCat.map(c=>c.val), backgroundColor: '#10b981', borderRadius: 4 }] }, { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { callback: formatMillones } } } });
                }
                if (document.getElementById('chartRubroAvg')) {
                    cCfg('chartRubroAvg', 'bar', { labels: topCat.map(c=>c.cat), datasets: [{ label: 'Costo Promedio ($)', data: topCat.map(c=>c.avg), backgroundColor: '#EC008C', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: formatCurrency } } } });
                }
            }

            // --- GRÁFICOS INDIVIDUALES COMERCIAL ---
            if (showComercial) {
                const dataAnio = dataAnioGlobal.filter(d => d.puntoVenta === dashboardLocal && d.isVentasLoaded);
                if(dataAnio.length === 0) return;

                const labels = dataAnio.map(d => d.mes);
                const dCols = dataAnio.map((d,i) => brandPalette[i % brandPalette.length]);
                const dVentas = dataAnio.map(d => d.ventas || 0);

                if (document.getElementById('mixedChart')) {
                    cCfg('mixedChart', 'bar', { labels, datasets: [ { label: 'Facturación ($)', data: dVentas, backgroundColor: dCols, borderRadius: 6, yAxisID: 'y' }, { label: 'Ticket Promedio ($)', data: dataAnio.map(d=>d.ticketPromedio), type: 'line', borderColor: '#EC008C', backgroundColor: '#EC008C', borderWidth: 3, pointBackgroundColor: '#fff', tension: 0.3, yAxisID: 'y1' } ] }, { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { type: 'linear', position: 'left', ticks: { callback: formatMillones } }, y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { callback: formatCurrency } } } });
                    cCfg('pieChart', 'doughnut', { labels, datasets: [{ data: dVentas, backgroundColor: dCols, borderWidth: 0, hoverOffset: 10 }] }, { responsive: true, maintainAspectRatio: false, cutout: '70%' });
                    cCfg('turnosChart', 'bar', { labels, datasets: [ { label: 'Turno Mañana ($)', data: dataAnio.map(d=>d.ventasManana), backgroundColor: '#EC008C', borderRadius: 4 }, { label: 'Turno Tarde ($)', data: dataAnio.map(d=>Math.max(0, d.ventas - d.ventasManana)), backgroundColor: '#1D1D1B', borderRadius: 4 } ] }, { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { ticks: { callback: formatMillones } } } });
                    cCfg('traficoChart', 'line', { labels, datasets: [{ label: 'Volumen Tickets', data: dataAnio.map(d=>d.tickets), borderColor: '#878787', backgroundColor: isDark ? 'rgba(135,135,135,0.1)' : 'rgba(135,135,135,0.05)', fill: true, tension: 0.4, borderWidth: 3, pointBackgroundColor: dCols }] }, { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: c => 'Tickets: ' + formatNumber(c.parsed.y) } } } });
                    cCfg('unidadesChart', 'bar', { labels, datasets: [ { label: 'Unidades Vendidas', data: dataAnio.map(d=>d.productosVendidos||0), backgroundColor: dCols, borderRadius: 6, yAxisID: 'y' }, { label: 'UPT', data: dataAnio.map(d=>d.tickets>0?(d.productosVendidos/d.tickets).toFixed(2):0), type: 'line', borderColor: '#1D1D1B', backgroundColor: '#1D1D1B', borderWidth: 3, pointBackgroundColor: '#fff', tension: 0.3, yAxisID: 'y1' } ] }, { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y1: { position: 'right', grid: { drawOnChartArea: false } } } });
                    const dataCrec = dataAnio.map((d, i) => i === 0 ? 0 : ((d.ventas - dataAnio[i-1].ventas) / dataAnio[i-1].ventas) * 100);
                    cCfg('crecimientoChart', 'bar', { labels, datasets: [{ label: 'Crecimiento MoM (%)', data: dataCrec, backgroundColor: dCols, borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: c => c.dataIndex===0?'Mes Base':`Variación: ${c.parsed.y>0?'+':''}${c.parsed.y.toFixed(1)}%` } } } });
                }

                const dMes = dataAnio.find(d => d.mes === dashboardMes);
                if (dMes && document.getElementById('chartDias')) {
                    let numDias = diasPorMes[dMes.mes] || 31;
                    if (dMes.mes === 'Febrero' && esBisiesto(parseInt(dashboardAnio))) numDias = 29;

                    let aggrVDia = new Array(numDias).fill(0);
                    let aggrVHora = new Array(10).fill(0);

                    if (dMes.grillaDiaria) {
                        for(let i=1; i<=numDias; i++) {
                            if(dMes.grillaDiaria[i]) {
                                horasDinamicas.forEach((h, idxH) => {
                                    let val = dMes.grillaDiaria[i][h]?.v || 0;
                                    aggrVDia[i-1] += val;
                                    aggrVHora[idxH] += val;
                                });
                            }
                        }
                    }

                    const colMes = brandPalette[dataAnio.findIndex(d => d.mes === dashboardMes) % brandPalette.length];
                    cCfg('chartDias', 'bar', { labels: Array.from({length:numDias}, (_,i)=>`Día ${i+1}`), datasets: [{ label: `Ventas ${dMes.mes}`, data: aggrVDia, backgroundColor: colMes, borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatMillones } } } });
                    cCfg('chartHora', 'bar', { labels: horasDinamicas.map(h=>`${h}:00`), datasets: [{ label: `Productividad Horaria`, data: aggrVHora, backgroundColor: colMes, borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatMillones } } } });
                }
            }
        }
    </script>
</body>
</html>
