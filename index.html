<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompanyAnalytics Pro - Panel Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
        .tab-active { border-bottom-width: 2px; border-color: #2563eb; color: #2563eb; font-weight: 600; }
        .subtab-active { background-color: #f1f5f9; color: #1e293b; border-color: #cbd5e1; }
        
        /* Estilo para tarjetas de meses */
        .month-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .month-card:hover { transform: translateY(-2px); border-color: #e2e8f0; }
        .month-card.active { border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-fuchsia-100 font-sans text-gray-900 pb-12">

    <!-- Header -->
    <header class="bg-white shadow-sm print-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-center relative">
            <img src="ModaShop.png" alt="Logo de la Empresa" class="h-16 object-contain" />
            
            <div id="export-btn-container" class="absolute right-4 sm:right-8 top-1/2 transform -translate-y-1/2" style="display: none;">
                <button onclick="window.print()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition shadow-sm font-medium text-sm">
                    <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline">Exportar PDF</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Navegación Principal -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>
            <div class="flex space-x-6 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 hover:text-gray-700 flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen
                </button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" class="py-4 px-1 text-sm transition text-gray-500 hover:text-gray-700 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Carga Ventas
                </button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" class="py-4 px-1 text-sm transition text-gray-500 hover:text-gray-700 flex items-center gap-2">
                    <i data-lucide="package" class="w-4 h-4"></i> Carga Stock
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 hover:text-gray-700 flex items-center gap-2">
                    <i data-lucide="store" class="w-4 h-4"></i> Historial
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { console.error(e); }

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        let dashboardSubTab = 'comercial';
        let selectedPeriod = null; // Ej: "Enero-2026"
        let chartInstances = {}; 

        const PUNTOS_VENTA = { deposito: 'Depósito', concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);

        let formState = {
            mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '',
            ventas: '', objetivo: '', tickets: '', productosVendidos: '',
            stock: [{ categoria: '', cantidad: '', valor: '' }]
        };

        if (auth) {
            signInAnonymously(auth).catch(console.error);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 flex items-center gap-1";
                    lucide.createIcons();
                    onSnapshot(collection(db, 'registros_mensuales'), (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => { appData.push({ dbId: documento.id, ...documento.data() }); });
                        
                        // Si no hay periodo seleccionado, elegir el más reciente
                        if (!selectedPeriod && appData.length > 0) {
                            const periods = getSortedPeriods();
                            selectedPeriod = periods[0].id;
                        }
                        render();
                    });
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 2 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(val || 0);
        const formatAxis = (value) => {
            if (Math.abs(value) < 1) return '$0';
            let absVal = Math.abs(value);
            if (absVal >= 1000000) return (value < 0 ? '-' : '') + '$' + (absVal / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (absVal >= 1000) return (value < 0 ? '-' : '') + '$' + (absVal / 1000).toFixed(0) + 'k';
            return (value < 0 ? '-' : '') + '$' + absVal.toLocaleString('es-AR');
        };

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };
        window.switchDashboardSubTab = (sub) => { dashboardSubTab = sub; render(); };
        window.setSelectedPeriod = (id) => { selectedPeriod = id; render(); };

        window.handleFormChange = (field, value) => { formState[field] = value; if (field === 'puntoVenta') render(); };
        window.handleStockChange = (idx, field, val) => { 
            formState.stock[idx][field] = val; 
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formState.stock.push({ categoria: '', cantidad: '', valor: '' }); window.renderFormStockRows(); };
        window.removeStockRow = (idx) => { formState.stock.splice(idx, 1); window.renderFormStockRows(); };

        window.submitGenericForm = async (e, type) => {
            e.preventDefault();
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            const docRef = doc(db, 'registros_mensuales', docId);
            let dataToSave = { mes: formState.mes, año: formState.año, puntoVenta: formState.puntoVenta, cotizacionDolar: window.parseInputNumber(formState.cotizacionDolar) || 1 };
            if (type === 'ventas') {
                dataToSave.ventas = window.parseInputNumber(formState.ventas);
                dataToSave.objetivo = window.parseInputNumber(formState.objetivo);
                dataToSave.tickets = window.parseInputNumber(formState.tickets);
                dataToSave.productosVendidos = window.parseInputNumber(formState.productosVendidos);
            } else {
                const stockLimpio = formState.stock.filter(s => s.categoria).map(s => ({
                    categoria: s.categoria, cantidad: window.parseInputNumber(s.cantidad), valor: window.parseInputNumber(s.valor)
                }));
                dataToSave.stock = stockLimpio;
                dataToSave.valorMercaderia = stockLimpio.reduce((acc, item) => acc + item.valor, 0);
            }
            await setDoc(docRef, dataToSave, { merge: true });
            if(type === 'ventas') { formState.ventas=''; formState.objetivo=''; formState.tickets=''; formState.productosVendidos=''; }
            else { formState.stock = [{ categoria: '', cantidad: '', valor: '' }]; }
            window.switchTab('historial');
        };

        window.deleteRecord = async (dbId) => { if(confirm('¿Eliminar registro completo?')) await deleteDoc(doc(db, 'registros_mensuales', dbId)); };

        function getSortedPeriods() {
            const periods = Array.from(new Set(appData.map(d => `${d.mes}-${d.año}`)));
            return periods.map(p => {
                const [m, a] = p.split('-');
                // Calcular capital del mes para la tarjeta
                const monthCap = appData.filter(d => d.mes === m && d.año === a).reduce((acc, curr) => acc + (curr.valorMercaderia || 0), 0);
                const monthDol = appData.filter(d => d.mes === m && d.año === a).reduce((max, curr) => Math.max(max, curr.cotizacionDolar || 0), 1);
                return { id: p, mes: m, año: a, capital: monthCap, dolar: monthDol };
            }).sort((a, b) => {
                if (a.año !== b.año) return Number(b.año) - Number(a.año);
                return monthOrder[b.mes] - monthOrder[a.mes];
            });
        }

        function getDiagnosticData() {
            if (appData.length === 0 || !selectedPeriod) return null;
            
            const periods = getSortedPeriods();
            const currIdx = periods.findIndex(p => p.id === selectedPeriod);
            const [lastMonth, lastYear] = selectedPeriod.split('-');
            
            const prevPeriod = periods[currIdx + 1] || null;
            const [prevMonth, prevYear] = prevPeriod ? prevPeriod.id.split('-') : [null, null];

            const lastMonthData = appData.filter(d => d.mes === lastMonth && d.año === lastYear);
            const prevMonthData = prevPeriod ? appData.filter(d => d.mes === prevMonth && d.año === prevYear) : [];

            let tV = 0, tObj = 0, tT = 0, tP = 0, tM = 0, cotiz = 1;
            let tM_prev = 0, cotiz_prev = 1;
            const capPorCat = {};

            lastMonthData.forEach(d => {
                tM += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz) cotiz = Number(d.cotizacionDolar);
                if (d.puntoVenta !== 'deposito') { 
                    tV += (d.ventas || 0); tObj += (d.objetivo || 0); tT += (d.tickets || 0); tP += (d.productosVendidos || 0); 
                }
                if (d.stock) d.stock.forEach(i => { 
                    if(!capPorCat[i.categoria]) capPorCat[i.categoria] = {v:0, c:0}; 
                    capPorCat[i.categoria].v += i.valor; 
                    capPorCat[i.categoria].c += i.cantidad; 
                });
            });

            prevMonthData.forEach(d => {
                tM_prev += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz_prev) cotiz_prev = Number(d.cotizacionDolar);
            });

            const momIndiv = Object.keys(PUNTOS_VENTA).map(key => {
                const cur = lastMonthData.find(d => d.puntoVenta === key);
                const pre = prevMonthData.find(d => d.puntoVenta === key);
                const isD = key === 'deposito';
                const vC_sales = cur ? (cur.ventas || 0) : 0;
                const vP_sales = pre ? (pre.ventas || 0) : 0;
                const vC_cap = cur ? (cur.valorMercaderia || 0) : 0;
                const vP_cap = pre ? (pre.valorMercaderia || 0) : 0;
                const growth = isD ? (vP_cap > 0 ? ((vC_cap-vP_cap)/vP_cap)*100 : 0) : (vP_sales > 0 ? ((vC_sales-vP_sales)/vP_sales)*100 : 0);
                return { key, nombre: PUNTOS_VENTA[key], vC_sales, vP_sales, vC_cap, vP_cap, growth, obj: cur?.objetivo || 0, tickets: cur?.tickets || 0, units: cur?.productosVendidos || 0, isDepo: isD };
            });

            return {
                lastMonthString: `${lastMonth} ${lastYear}`, prevMonthString: prevMonth ? `${prevMonth} ${prevYear}` : 'N/A',
                tV, tM, tM_prev, cotiz, cotiz_prev, cumplimiento: tObj > 0 ? (tV/tObj)*100 : 0, ticketPromedio: tT > 0 ? tV/tT : 0, unidadesTicket: tT > 0 ? tP/tT : 0,
                momIndiv, lastMonthData,
                catStats: Object.keys(capPorCat).map(k => ({name: k, val: capPorCat[k].v, avg: capPorCat[k].c > 0 ? capPorCat[k].v/capPorCat[k].c : 0})).sort((a,b)=>b.val-a.val)
            };
        }

        window.renderFormStockRows = () => {
            const container = document.getElementById('stock-rows-container');
            if(!container) return;
            container.innerHTML = formState.stock.map((item, idx) => `
                <div class="flex gap-2 items-center">
                    <div class="flex-[2]"><input type="text" placeholder="Rubro" class="w-full p-2 border rounded-lg text-sm" value="${item.categoria}" onchange="handleStockChange(${idx}, 'categoria', this.value)" required /></div>
                    <div class="flex-1"><input type="text" placeholder="Cant." class="w-full p-2 border rounded-lg text-center text-sm" value="${item.cantidad}" onchange="handleStockChange(${idx}, 'cantidad', this.value)" required /></div>
                    <div class="flex-[1.5] relative"><span class="absolute left-2 top-2 text-gray-400 text-sm">$</span><input type="text" placeholder="Valor" class="w-full pl-5 p-2 border rounded-lg text-sm font-medium" value="${item.valor}" onchange="handleStockChange(${idx}, 'valor', this.value)" required /></div>
                    ${formState.stock.length > 1 ? `<button type="button" onclick="removeStockRow(${idx})" class="p-2 text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '<div class="w-8"></div>'}
                </div>
            `).join('');
            lucide.createIcons();
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };

        function render() {
            const main = document.getElementById('main-content');
            const nav = ['dashboard', 'cargaVentas', 'cargaStock', 'historial'];
            nav.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(el) el.className = (t === activeTab) ? "tab-active py-4 px-1 text-sm flex items-center gap-2" : "py-4 px-1 text-sm text-gray-500 hover:text-gray-700 flex items-center gap-2";
            });

            if (activeTab === 'dashboard') {
                const periods = getSortedPeriods();
                const d = getDiagnosticData();
                
                if (periods.length === 0) { 
                    main.innerHTML = `<div class="text-center py-20 bg-white rounded-xl shadow-sm border max-w-2xl mx-auto mt-10"><i data-lucide="bar-chart-2" class="mx-auto w-16 h-16 text-fuchsia-300 mb-4"></i><h3 class="text-xl font-bold">Sin datos</h3><p class="text-gray-500">Cargue Ventas o Stock para visualizar el informe.</p></div>`; return; 
                }
                
                document.getElementById('export-btn-container').style.display = 'block';
                const showComercial = dashboardSubTab === 'comercial' || dashboardSubTab === 'completo';
                const showCapital = dashboardSubTab === 'capital' || dashboardSubTab === 'completo';

                main.innerHTML = `
                    <div class="space-y-6">
                        <!-- SELECTOR DE MESES (Interactivos) -->
                        <div class="flex overflow-x-auto gap-4 pb-4 print-hidden no-scrollbar">
                            ${periods.map(p => `
                                <div onclick="setSelectedPeriod('${p.id}')" class="month-card flex-shrink-0 min-w-[200px] bg-white p-4 rounded-2xl shadow-sm ${selectedPeriod === p.id ? 'active' : ''}">
                                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">${p.año}</p>
                                    <h4 class="text-lg font-black text-slate-800 mb-2">${p.mes}</h4>
                                    <p class="text-[10px] text-indigo-500 font-bold uppercase mb-0.5">Capital Global</p>
                                    <p class="text-sm font-bold text-slate-600">${formatCurrency(p.capital)}</p>
                                    <p class="text-[9px] text-slate-400">${formatUSD(p.capital/p.dolar)}</p>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Sub-Navegación Interna -->
                        <div class="flex bg-white p-1 rounded-xl shadow-sm border border-gray-100 w-fit mx-auto print-hidden mb-6">
                            <button onclick="switchDashboardSubTab('comercial')" class="px-6 py-2 rounded-lg text-xs font-bold transition-all ${dashboardSubTab==='comercial'?'subtab-active':'text-gray-400'}">ANÁLISIS COMERCIAL</button>
                            <button onclick="switchDashboardSubTab('capital')" class="px-6 py-2 rounded-lg text-xs font-bold transition-all ${dashboardSubTab==='capital'?'subtab-active':'text-gray-400'}">ANÁLISIS DE CAPITAL</button>
                            <button onclick="switchDashboardSubTab('completo')" class="px-6 py-2 rounded-lg text-xs font-bold transition-all ${dashboardSubTab==='completo'?'subtab-active':'text-gray-400'}">INFORME COMPLETO</button>
                        </div>

                        <!-- KPIs Comerciales -->
                        ${showComercial ? `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-emerald-500">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Facturación Locales</p>
                                <h3 class="text-xl font-black text-slate-800">${formatCurrency(d.tV)}</h3>
                                <p class="text-xs text-emerald-600 font-medium">${formatUSD(d.tV/d.cotiz)}</p>
                            </div>
                            <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-amber-500">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Ticket Promedio</p>
                                <h3 class="text-xl font-black text-slate-800">${formatCurrency(d.ticketPromedio)}</h3>
                            </div>
                            <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Eficiencia UPT</p>
                                <h3 class="text-xl font-black text-slate-800">${d.unidadesTicket.toFixed(2)} u.</h3>
                            </div>
                        </div>
                        ` : ''}

                        <!-- Gráficos dinámicos según pestaña -->
                        ${showComercial ? `
                            <div class="space-y-6">
                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Composición de Ventas</h3><div class="h-[250px]"><canvas id="chartVentasMix"></canvas></div></div>
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Brecha de Metas</h3><div class="h-[250px]"><canvas id="chartGap"></canvas></div></div>
                                </div>
                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Variación MoM Ventas</h3><div class="h-[250px]"><canvas id="chartMomComercial"></canvas></div></div>
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">UPT por Local</h3><div class="h-[250px]"><canvas id="chartUPT"></canvas></div></div>
                                </div>
                            </div>
                        ` : ''}

                        ${showCapital ? `
                            <div class="space-y-6">
                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Distribución del Capital</h3><div class="h-[250px]"><canvas id="chartCapitalMix"></canvas></div></div>
                                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Valor Unitario por Rubro</h3><div class="h-[250px]"><canvas id="chartRubroAvg"></canvas></div></div>
                                </div>
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="font-bold text-xs mb-4 uppercase text-gray-400 tracking-widest">Variación MoM Capital</h3><div class="h-[250px]"><canvas id="chartMomCapital"></canvas></div></div>
                            </div>
                        ` : ''}

                        <!-- Diagnóstico Dinámico -->
                        <div class="bg-slate-900 text-white p-8 rounded-2xl shadow-xl">
                            <div class="flex items-center gap-3 mb-6"><div class="p-2 bg-blue-500/20 rounded-lg"><i data-lucide="file-text" class="text-blue-400"></i></div><h3 class="text-lg font-bold">Diagnóstico Ejecutivo - ${d.lastMonthString}</h3></div>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-sm">
                                <div class="space-y-3">
                                    <p class="text-slate-400 uppercase font-bold tracking-widest text-[10px]">Análisis Comercial</p>
                                    <p>Ventas totales: <strong>${formatCurrency(d.tV)}</strong>. Cumplimiento de metas: <strong>${d.cumplimiento.toFixed(1)}%</strong>. Ticket promedio registrado de <strong>${formatCurrency(d.ticketPromedio)}</strong>.</p>
                                </div>
                                <div class="space-y-3">
                                    <p class="text-slate-400 uppercase font-bold tracking-widest text-[10px]">Situación Patrimonial</p>
                                    <p>Variación de Capital Global: de ${formatCurrency(d.tM_prev)} a <strong>${formatCurrency(d.tM)}</strong>. Valorizado en dólares: <strong>${formatUSD(d.tM/d.cotiz)}</strong>.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                initCharts(d);
            } else if (activeTab === 'cargaVentas') {
                document.getElementById('export-btn-container').style.display = 'none';
                main.innerHTML = `
                    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border animate-in fade-in">
                        <form onsubmit="submitGenericForm(event, 'ventas')" class="space-y-6">
                            <div class="p-6 bg-slate-50 rounded-xl border border-slate-200">
                                <label class="block text-center font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-2">Punto de Venta</label>
                                <select class="w-full p-3 text-xl font-bold border-2 rounded-xl border-blue-200 text-blue-800 outline-none" onchange="handleFormChange('puntoVenta', this.value)">
                                    ${Object.entries(PUNTOS_VENTA).filter(([k])=>k!=='deposito').map(([k,v]) => `<option value="${k}" ${formState.puntoVenta===k?'selected':''}>${v}</option>`).join('')}
                                </select>
                                <div class="grid grid-cols-3 gap-3 mt-4">
                                    <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Mes</label><select class="w-full p-2 border rounded-lg text-sm" onchange="handleFormChange('mes', this.value)">${mesesList.map(m => `<option value="${m}" ${formState.mes===m?'selected':''}>${m}</option>`).join('')}</select></div>
                                    <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Año</label><input type="number" class="w-full p-2 border rounded-lg text-sm" value="${formState.año}" onchange="handleFormChange('año', this.value)" required></div>
                                    <div><label class="block text-[10px] font-bold text-emerald-500 uppercase mb-1">Dólar</label><input type="text" class="w-full p-2 border-emerald-200 border rounded-lg text-sm font-bold" value="${formState.cotizacionDolar}" onchange="handleFormChange('cotizacionDolar', this.value)" required></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-blue-50 p-5 rounded-xl border border-blue-100"><label class="block text-xs font-bold text-blue-800 uppercase mb-2">Venta Real ($)</label><input type="text" placeholder="Pegar Excel..." class="w-full p-3 border rounded-xl font-bold" value="${formState.ventas}" onchange="handleFormChange('ventas', this.value)" required></div>
                                <div class="bg-amber-50 p-5 rounded-xl border border-amber-100"><label class="block text-xs font-bold text-amber-800 uppercase mb-2">Meta ($)</label><input type="text" placeholder="Pegar Excel..." class="w-full p-3 border rounded-xl font-bold" value="${formState.objetivo}" onchange="handleFormChange('objetivo', this.value)" required></div>
                                <div class="bg-purple-50 p-5 rounded-xl border border-purple-100"><label class="block text-xs font-bold text-purple-800 uppercase mb-2">Tickets</label><input type="text" class="w-full p-3 border rounded-xl font-bold" value="${formState.tickets}" onchange="handleFormChange('tickets', this.value)" required></div>
                                <div class="bg-purple-50 p-5 rounded-xl border border-purple-100"><label class="block text-xs font-bold text-purple-800 uppercase mb-2">Unidades</label><input type="text" class="w-full p-3 border rounded-xl font-bold" value="${formState.productosVendidos}" onchange="handleFormChange('productosVendidos', this.value)" required></div>
                            </div>
                            <div class="flex justify-end"><button type="submit" class="bg-slate-900 text-white px-10 py-4 rounded-xl font-bold uppercase shadow-xl hover:bg-black transition">Guardar Ventas</button></div>
                        </form>
                    </div>
                `;
            } else if (activeTab === 'cargaStock') {
                document.getElementById('export-btn-container').style.display = 'none';
                main.innerHTML = `
                    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border animate-in fade-in">
                        <form onsubmit="submitGenericForm(event, 'stock')" class="space-y-6">
                            <div class="p-6 bg-slate-50 rounded-xl border border-slate-200">
                                <label class="block text-center font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-2">Punto de Venta</label>
                                <select class="w-full p-3 text-xl font-bold border-2 rounded-xl border-indigo-200 text-indigo-800 outline-none" onchange="handleFormChange('puntoVenta', this.value)">
                                    ${Object.entries(PUNTOS_VENTA).map(([k,v]) => `<option value="${k}" ${formState.puntoVenta===k?'selected':''}>${v}</option>`).join('')}
                                </select>
                                <div class="grid grid-cols-3 gap-3 mt-4">
                                    <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Mes</label><select class="w-full p-2 border rounded-lg text-sm" onchange="handleFormChange('mes', this.value)">${mesesList.map(m => `<option value="${m}" ${formState.mes===m?'selected':''}>${m}</option>`).join('')}</select></div>
                                    <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Año</label><input type="number" class="w-full p-2 border rounded-lg text-sm" value="${formState.año}" onchange="handleFormChange('año', this.value)" required></div>
                                    <div><label class="block text-[10px] font-bold text-emerald-500 uppercase mb-1">Dólar</label><input type="text" class="w-full p-2 border-emerald-200 border rounded-lg text-sm font-bold" value="${formState.cotizacionDolar}" onchange="handleFormChange('cotizacionDolar', this.value)" required></div>
                                </div>
                            </div>
                            <div class="bg-emerald-50 p-6 rounded-xl border border-emerald-100">
                                <div class="flex justify-between items-center mb-4">
                                    <div><h3 class="text-sm font-bold text-emerald-900 uppercase">Detalle por Rubro</h3><p id="stock-sum-display" class="text-lg font-black text-emerald-600">Total: $0,00</p></div>
                                    <button type="button" onClick="addStockRow()" class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-sm">+ Añadir Rubro</button>
                                </div>
                                <div id="stock-rows-container" class="space-y-2"></div>
                            </div>
                            <div class="flex justify-end"><button type="submit" class="bg-indigo-900 text-white px-10 py-4 rounded-xl font-bold uppercase shadow-xl hover:bg-black transition">Guardar Stock</button></div>
                        </form>
                    </div>
                `;
                window.renderFormStockRows();
            } else {
                main.innerHTML = `<div class="bg-white rounded-xl shadow-sm border overflow-hidden animate-in fade-in"><div class="p-6 border-b bg-slate-50 flex justify-between items-center font-bold uppercase text-xs tracking-widest">Historial de Cargas</div><div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="bg-white text-gray-400 border-b"><th class="p-4">Período</th><th class="p-4">Punto</th><th class="p-4 text-right">Venta</th><th class="p-4 text-right">Capital</th><th class="p-4 text-center">Acción</th></tr></thead><tbody>${appData.slice().sort((a,b)=>b.id-a.id).map(r=>`<tr class="border-b hover:bg-slate-50"><td class="p-4 font-bold text-slate-800">${r.mes} ${r.año}</td><td class="p-4 text-blue-600 font-bold">${PUNTOS_VENTA[r.puntoVenta]}</td><td class="p-4 text-right font-bold text-emerald-600">${r.ventas ? formatCurrency(r.ventas) : '-'}</td><td class="p-4 text-right font-bold text-indigo-700">${r.valorMercaderia ? formatCurrency(r.valorMercaderia) : '-'}</td><td class="p-4 text-center"><button onclick="deleteRecord('${r.dbId}')" class="text-red-300 hover:text-red-600 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('')}</tbody></table></div></div>`;
            }
            lucide.createIcons();
        }

        function initCharts(d) {
            const chartCfg = (id, type, data, options) => { if (chartInstances[id]) chartInstances[id].destroy(); const ctx = document.getElementById(id); if (ctx) chartInstances[id] = new Chart(ctx.getContext('2d'), { type, data, options }); };
            const locals = d.momIndiv.filter(m => !m.isDepo);

            if (document.getElementById('chartVentasMix')) {
                chartCfg('chartVentasMix', 'doughnut', { labels: locals.map(l=>l.nombre), datasets: [{ data: locals.map(l=>l.vC_sales), backgroundColor: ['#0284c7', '#16a34a', '#7c3aed'], borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartGap', 'bar', { labels: locals.map(l=>l.nombre), datasets: [{ label: 'Venta Real', data: locals.map(l=>l.vC_sales), backgroundColor: '#3b82f6', borderRadius: 4 }, { label: 'Objetivo', data: locals.map(l=>l.obj), backgroundColor: '#e2e8f0', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartMomComercial', 'bar', { labels: locals.map(m=>m.nombre), datasets: [{ label: d.prevMonthString, data: locals.map(m=>m.vP_sales), backgroundColor: '#cbd5e1', borderRadius: 4 }, { label: d.lastMonthString, data: locals.map(m=>m.vC_sales), backgroundColor: '#3b82f6', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartUPT', 'bar', { labels: locals.map(l=>l.nombre), datasets: [{ data: locals.map(l=>l.tickets > 0 ? l.units/l.tickets : 0), backgroundColor: '#8b5cf6', borderRadius: 20 }] }, { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } });
            }

            if (document.getElementById('chartCapitalMix')) {
                chartCfg('chartCapitalMix', 'doughnut', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: ['#64748b', '#0284c7', '#16a34a', '#7c3aed'], borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartRubroAvg', 'bar', { labels: d.catStats.map(c=>c.name), datasets: [{ label: 'Valor Prom. Unidad', data: d.catStats.map(c=>c.avg), backgroundColor: '#10b981', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartMomCapital', 'bar', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ label: d.prevMonthString, data: d.momIndiv.map(m=>m.vP_cap), backgroundColor: '#cbd5e1', borderRadius: 4 }, { label: d.lastMonthString, data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: '#3b82f6', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
            }
        }
        render();
    </script>
</body>
</html>
