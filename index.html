<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas-Informes</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        if (localStorage.getItem('theme') === 'light') { document.documentElement.classList.remove('dark'); } 
        else { document.documentElement.classList.add('dark'); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { magenta: '#EC008C', black: '#1D1D1B', gray: '#878787', light: '#fdf2f8' }
                    },
                    fontFamily: { sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; color: black !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
            .html2pdf__page-break { height: 0; page-break-before: always !important; margin: 0; padding: 0; border: none; }
        }
        body, div, header, nav, button, p, h2, h3, h4, span, td, th { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .tab-active { border-bottom-width: 2px; border-color: #EC008C; color: #EC008C; font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .tabla-excel th { position: sticky; top: 0; z-index: 10; }
        .tabla-excel td { min-width: 90px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-brand-black dark:text-gray-100 pb-12 min-h-screen">

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 bg-brand-black dark:bg-white text-white dark:text-brand-black rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center border border-gray-700 dark:border-gray-200">
        <i id="theme-icon-light" data-lucide="sun" class="w-6 h-6 hidden dark:block hover:rotate-45 transition-transform duration-500"></i>
        <i id="theme-icon-dark" data-lucide="moon" class="w-6 h-6 block dark:hidden hover:-rotate-12 transition-transform duration-500"></i>
    </button>

    <header class="bg-white dark:bg-slate-900 shadow-sm print-hidden border-b border-gray-100 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between relative">
            <img src="logo.png" alt="Logo de la Empresa" class="h-16 object-contain bg-white/10 rounded-xl p-1" />
            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" id="btn-admin" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg transition shadow-sm font-bold text-sm">
                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>
                </button>
            </div>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>
            <div class="flex space-x-6 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 hover:text-brand-magenta flex items-center gap-2 font-bold"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen</button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 hover:text-brand-magenta flex items-center gap-2 font-bold"><i data-lucide="trending-up" class="w-4 h-4"></i> Carga Ventas</button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 hover:text-brand-magenta flex items-center gap-2 font-bold"><i data-lucide="package" class="w-4 h-4"></i> Carga Stock</button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 hover:text-brand-magenta flex items-center gap-2 font-bold"><i data-lucide="store" class="w-4 h-4"></i> Historial</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // IMPORTANTE: REEMPLAZA CON TUS CLAVES
        const firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let appData = [];
        let baseDatosLocales = {}; 
        
        let activeTab = 'dashboard';
        let isAdmin = false; 
        const ADMIN_PIN = "1234"; 
        
        let localActual = 'concordia';
        let anioActual = new Date().getFullYear().toString();
        let chartMixto=null, chartTorta=null, chartTurnos=null, chartTrafico=null, chartCrecimiento=null, chartUnidades=null, chartHora=null, chartDias=null;
        
        const horasDinamicas = [8, 9, 10, 11, 12, 17, 18, 19, 20, 21];
        const diasPorMes = { 'Enero': 31, 'Febrero': 28, 'Marzo': 31, 'Abril': 30, 'Mayo': 31, 'Junio': 30, 'Julio': 31, 'Agosto': 31, 'Septiembre': 30, 'Octubre': 31, 'Noviembre': 30, 'Diciembre': 31 };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);
        const PUNTOS_VENTA = { concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens', deposito: 'Depósito' };

        const paleta = ['#EC008C', '#1D1D1B', '#878787', '#f472b6', '#333333', '#8b5cf6', '#14b8a6', '#6366f1', '#f59e0b', '#10b981', '#06b6d4', '#f43f5e'];

        window.toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            render(); 
        };

        window.toggleAdmin = () => {
            if (isAdmin) { isAdmin = false; if (activeTab === 'cargaVentas' || activeTab === 'cargaStock') activeTab = 'dashboard'; render(); }
            else {
                const pin = prompt("🔐 MODO SEGURO ACTIVO\n\nIngresa el PIN para habilitar la edición:");
                if (pin === ADMIN_PIN) { isAdmin = true; render(); }
                else if (pin !== null) alert("❌ PIN incorrecto.");
            }
        };

        if (auth) {
            signInAnonymously(auth).catch(console.error);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1";
                    lucide.createIcons();
                    
                    onSnapshot(collection(db, 'registros_mensuales'), (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => { appData.push({ dbId: documento.id, ...documento.data() }); });
                        transformarDatosParaDashboard();
                        render();
                    });
                }
            });
        }

        function transformarDatosParaDashboard() {
            baseDatosLocales = { 'concordia': {}, 'chajari': {}, 'tendens': {}, 'deposito': {} };
            appData.forEach(doc => {
                let loc = doc.puntoVenta; let yr = doc.año;
                if(loc && yr) {
                    if(!baseDatosLocales[loc]) baseDatosLocales[loc] = {};
                    if(!baseDatosLocales[loc][yr]) baseDatosLocales[loc][yr] = [];
                    doc.ticketPromedio = doc.tickets > 0 ? (doc.ventas / doc.tickets) : 0;
                    baseDatosLocales[loc][yr].push(doc);
                }
            });
            Object.keys(baseDatosLocales).forEach(loc => {
                Object.keys(baseDatosLocales[loc]).forEach(yr => {
                    baseDatosLocales[loc][yr].sort((a,b) => monthOrder[a.mes] - monthOrder[b.mes]);
                });
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('es-AR').format(val || 0);
        const formatMillones = (value) => isNaN(value) ? '$0M' : '$' + (value / 1000000).toFixed(1) + 'M';

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };
        
        let formStockState = { mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '', stock: [{ categoria: '', cantidad: '', valor: '' }] };
        window.handleStockFormChange = (field, val) => { formStockState[field] = val; };
        window.handleStockChange = (idx, field, val) => { 
            formStockState.stock[idx][field] = val; 
            const suma = formStockState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formStockState.stock.push({ categoria: '', cantidad: '', valor: '' }); render(); };
        window.removeStockRow = (idx) => { formStockState.stock.splice(idx, 1); render(); };

        let formVentasState = { mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '', unidades: '' };
        window.handleVentasFormChange = (field, val) => { formVentasState[field] = val; if(field==='mes' || field==='año') render(); };
        
        window.cambiarTipoDia = function(dia, selectElement) {
            const tr = selectElement.closest('tr');
            if (selectElement.value !== 'normal') { tr.classList.add('bg-gray-100', 'dark:bg-slate-800'); } 
            else { tr.classList.remove('bg-gray-100', 'dark:bg-slate-800'); }
        };

        window.cambiarDashLocal = function(val) { localActual = val; render(); };
        window.cambiarDashAnio = function(val) { anioActual = val; render(); };
        window.cambiarDashMes = function(val) { renderGraficosDetalle(val); };

        window.submitStockForm = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const docId = `${formStockState.mes}-${formStockState.año}-${formStockState.puntoVenta}`;
            const stockLimpio = formStockState.stock.filter(s => s.categoria).map(s => ({ categoria: s.categoria, cantidad: window.parseInputNumber(s.cantidad), valor: window.parseInputNumber(s.valor) }));
            let dataToSave = { mes: formStockState.mes, año: formStockState.año, puntoVenta: formStockState.puntoVenta, cotizacionDolar: window.parseInputNumber(formStockState.cotizacionDolar) || 1, isStockLoaded: true, stock: stockLimpio, valorMercaderia: stockLimpio.reduce((acc, item) => acc + item.valor, 0) };
            await setDoc(doc(db, 'registros_mensuales', docId), dataToSave, { merge: true });
            formStockState.stock = [{ categoria: '', cantidad: '', valor: '' }];
            window.switchTab('historial');
        };

        window.submitVentasForm = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            let ventas = 0, ventasManana = 0, tickets = 0, ticketsManana = 0, diasOperativos = 0;
            let grillaDiaria = {}; let tiposDia = {};
            
            let numDias = diasPorMes[formVentasState.mes] || 31;
            if (formVentasState.mes === 'Febrero' && ((formVentasState.año % 4 === 0 && formVentasState.año % 100 !== 0) || (formVentasState.año % 400 === 0))) numDias = 29;

            for(let i=1; i<=numDias; i++) {
                let elTipo = document.getElementById(`tipo_dia_${i}`);
                let tipo = elTipo ? elTipo.value : 'normal';
                tiposDia[i] = tipo;
                
                let datosDia = {}; let diaTieneDatos = false; let ventaDia = 0;
                horasDinamicas.forEach(h => {
                    let v = window.parseInputNumber(document.getElementById(`v_${i}_${h}`)?.value);
                    let t = window.parseInputNumber(document.getElementById(`t_${i}_${h}`)?.value);
                    if(v>0 || t>0) {
                        diaTieneDatos = true; datosDia[h] = {v, t};
                        ventas += v; tickets += t; ventaDia += v;
                        if(h <= 12) { ventasManana += v; ticketsManana += t; }
                    }
                });
                if(diaTieneDatos) grillaDiaria[i] = datosDia;
                if(tipo === 'normal' || ventaDia > 0) diasOperativos++;
            }

            if (ventas === 0 && tickets === 0) { alert('Debes cargar información en la grilla.'); return; }

            const docId = `${formVentasState.mes}-${formVentasState.año}-${formVentasState.puntoVenta}`;
            let dataToSave = { 
                mes: formVentasState.mes, año: formVentasState.año, puntoVenta: formVentasState.puntoVenta, 
                cotizacionDolar: window.parseInputNumber(formVentasState.cotizacionDolar) || 1, 
                isVentasLoaded: true, ventas, ventasManana, tickets, ticketsManana, 
                productosVendidos: window.parseInputNumber(formVentasState.unidades), 
                grillaDiaria, tiposDia, diasOperativos 
            };
            
            await setDoc(doc(db, 'registros_mensuales', docId), dataToSave, { merge: true });
            formVentasState.unidades = '';
            window.switchTab('historial');
        };

        window.deleteRecord = async (dbId) => { if(confirm('¿Eliminar registro histórico?')) await deleteDoc(doc(db, 'registros_mensuales', dbId)); };

        function render() {
            const main = document.getElementById('main-content');
            
            const tabVentas = document.getElementById('tab-cargaVentas');
            const tabStock = document.getElementById('tab-cargaStock');
            if(tabVentas) tabVentas.style.display = isAdmin ? 'flex' : 'none';
            if(tabStock) tabStock.style.display = isAdmin ? 'flex' : 'none';

            const btnAdmin = document.getElementById('btn-admin');
            if (btnAdmin) {
                btnAdmin.innerHTML = isAdmin ? `<i data-lucide="unlock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Edición</span>` : `<i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>`;
                btnAdmin.className = isAdmin 
                    ? "flex items-center gap-2 bg-brand-light dark:bg-brand-magenta/20 text-brand-magenta dark:text-brand-magenta px-4 py-2 rounded-lg transition shadow-sm font-bold text-sm border border-brand-magenta/30" 
                    : "flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm font-bold text-sm border border-transparent";
            }

            const nav = ['dashboard', 'cargaVentas', 'cargaStock', 'historial'];
            nav.forEach(t => { 
                const el = document.getElementById(`tab-${t}`); 
                if(el) {
                    el.style.display = (t==='cargaVentas'||t==='cargaStock') && !isAdmin ? 'none' : 'flex';
                    el.className = (t === activeTab) ? "tab-active py-4 px-1 text-sm flex items-center gap-2" : "py-4 px-1 text-sm text-brand-gray dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold transition-colors"; 
                }
            });

            if (activeTab === 'dashboard') {
                let aniosDisponibles = [...new Set(appData.map(d=>d.año))].sort((a,b)=>b-a);
                if(aniosDisponibles.length===0) aniosDisponibles=[new Date().getFullYear().toString()];
                if(!aniosDisponibles.includes(anioActual)) anioActual = aniosDisponibles[0];

                let dataAnio = baseDatosLocales[localActual]?.[anioActual] || [];

                let htmlDashboard = `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm p-6 mb-6 flex flex-col md:flex-row items-center justify-between border-l-8 border-brand-magenta gap-4">
                        <div class="flex items-center gap-4">
                            <h1 class="text-2xl font-extrabold text-brand-black dark:text-white flex items-center gap-2">
                                <i data-lucide="bar-chart" class="text-brand-magenta"></i> Dashboard Analítico
                            </h1>
                        </div>
                        <div class="flex items-center gap-4">
                            <select onchange="cambiarDashLocal(this.value)" class="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-brand-black dark:text-white rounded-lg px-4 py-2 font-bold focus:outline-none focus:border-brand-magenta">
                                ${Object.entries(PUNTOS_VENTA).filter(([k])=>k!=='deposito').map(([k,v]) => `<option value="${k}" ${localActual===k?'selected':''}>${v}</option>`).join('')}
                            </select>
                            <select onchange="cambiarDashAnio(this.value)" class="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-brand-black dark:text-white rounded-lg px-4 py-2 font-bold focus:outline-none focus:border-brand-magenta">
                                ${aniosDisponibles.map(a => `<option value="${a}" ${anioActual===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                `;

                if (dataAnio.length === 0) {
                    htmlDashboard += `<div class="text-center py-20 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-gray-100 dark:border-slate-800"><i data-lucide="inbox" class="mx-auto w-16 h-16 text-brand-gray mb-4"></i><h3 class="text-xl font-bold dark:text-white">Aún no hay datos cargados para ${PUNTOS_VENTA[localActual]} en ${anioActual}.</h3></div>`;
                    main.innerHTML = htmlDashboard;
                    lucide.createIcons();
                    return;
                }

                let sumVentas=0, sumTickets=0, sumDiasOp=0;
                dataAnio.forEach(d => { sumVentas+=d.ventas; sumTickets+=d.tickets; sumDiasOp+=(d.diasOperativos||30); });
                let tPromAnual = sumTickets>0 ? sumVentas/sumTickets : 0;
                let vDiaAnual = sumDiasOp>0 ? sumVentas/sumDiasOp : 0;

                htmlDashboard += `
                <div class="w-full space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-6 border-b-4 border-brand-magenta"><p class="text-sm text-brand-gray font-bold uppercase tracking-wider">Facturación Anual</p><h2 class="text-3xl font-black text-brand-black dark:text-white mt-2">${formatMillones(sumVentas)}</h2></div>
                        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-6 border-b-4 border-brand-black"><p class="text-sm text-brand-gray font-bold uppercase tracking-wider">Tráfico Anual (Tickets)</p><h2 class="text-3xl font-black text-brand-black dark:text-white mt-2">${formatNumber(sumTickets)}</h2></div>
                        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-6 border-b-4 border-brand-gray"><p class="text-sm text-brand-gray font-bold uppercase tracking-wider">Ticket Promedio</p><h2 class="text-3xl font-black text-brand-black dark:text-white mt-2">${formatCurrency(tPromAnual)}</h2></div>
                        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-6 border-b-4 border-slate-300"><p class="text-sm text-brand-gray font-bold uppercase tracking-wider">Venta Diaria Prom.</p><h2 class="text-3xl font-black text-brand-black dark:text-white mt-2">${formatCurrency(vDiaAnual)}</h2></div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-6">
                        <div class="flex justify-between items-center mb-6 border-b dark:border-slate-800 pb-2">
                            <h3 class="text-xl font-bold text-brand-black dark:text-white flex items-center"><i class="fas fa-calendar-check mr-3 text-brand-magenta"></i> Resumen del Mes</h3>
                            <select id="selectorMesGlobal" onchange="cambiarDashMes(this.value)" class="bg-transparent border-b-2 border-brand-magenta text-brand-magenta cursor-pointer outline-none font-bold text-lg">
                                ${dataAnio.map(d => `<option value="${d.mes}">${d.mes}</option>`).join('')}
                            </select>
                        </div>
                        <div id="contenedor-kpi-mes" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            const upt = dataMes.tickets > 0 ? (dataMes.productosVendidos / dataMes.tickets).toFixed(2) : '0.00';
            
            document.getElementById('contenedor-kpi-mes').innerHTML = `
                <div class="bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-800"><p class="text-xs font-bold text-brand-gray uppercase">Venta Total</p><h4 class="text-xl font-black text-brand-black dark:text-white mt-1">${formatCurrency(dataMes.ventas)}</h4></div>
                <div class="bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-800"><p class="text-xs font-bold text-brand-gray uppercase">Ticket Prom.</p><h4 class="text-xl font-black text-brand-black dark:text-white mt-1">${formatCurrency(dataMes.ticketPromedio)}</h4></div>
                <div class="bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-800"><p class="text-xs font-bold text-brand-gray uppercase">Total Tickets</p><h4 class="text-xl font-black text-brand-black dark:text-white mt-1">${formatNumber(dataMes.tickets)}</h4></div>
                <div class="bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-800"><p class="text-xs font-bold text-brand-gray uppercase">UPT</p><h4 class="text-xl font-black text-brand-black dark:text-white mt-1">${upt}</h4></div>
            `;

            let numDias = diasPorMes[mes] || 31;
            if (mes === 'Febrero' && ((parseInt(anioActual) % 4 === 0 && parseInt(anioActual) % 100 !== 0) || (parseInt(anioActual) % 400 === 0))) numDias = 29;

            let aggrVentasDia = new Array(numDias).fill(0);
            let aggrVentasHora = new Array(10).fill(0);

            if (dataMes.grillaDiaria) {
                for(let i=1; i<=numDias; i++) {
                    if(dataMes.grillaDiaria[i]) {
                        horasDinamicas.forEach((h, idxH) => {
                            let val = dataMes.grillaDiaria[i][h]?.v || 0;
                            aggrVentasDia[i-1] += val;
                            aggrVentasHora[idxH] += val;
                        });
                    }
                }
            }

            const chartCfg = (id, type, data, options) => { const ctx = document.getElementById(id); if (ctx) return new Chart(ctx.getContext('2d'), { type, data, options }); };
            if (chartDias) chartDias.destroy(); if (chartHora) chartHora.destroy();

            const isDark = document.documentElement.classList.contains('dark');
            const colorMes = paleta[dataAnio.findIndex(d => d.mes === mes) % paleta.length];

            chartDias = chartCfg('chartDias', 'bar', { labels: Array.from({length:numDias}, (_,i)=>`Día ${i+1}`), datasets: [{ label: 'Ventas Diarias', data: aggrVentasDia, backgroundColor: colorMes, borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatMillones } } } });
            chartHora = chartCfg('chartHora', 'bar', { labels: horasDinamicas.map(h=>`${h}:00`), datasets: [{ label: 'Ventas por Hora', data: aggrVentasHora, backgroundColor: colorMes, borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatMillones } } } });
        };
    </script>
</body>
</html>
