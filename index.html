<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompanyAnalytics Pro - Panel Ejecutivo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Íconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Estilos específicos para impresión */
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="bg-fuchsia-100 font-sans text-gray-900 pb-12">

    <!-- Header -->
    <header class="bg-white shadow-sm print-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-center relative">
            <!-- Reemplaza el src con la ruta o URL de tu logo real -->
            <img src="ModaShop.png" alt="Logo de la Empresa" class="h-16 object-contain" />
            
            <!-- Botón Exportar PDF (Esquina Superior Derecha) -->
            <div id="export-btn-container" class="absolute right-4 sm:right-8 top-1/2 transform -translate-y-1/2" style="display: none;">
                <button onclick="window.print()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition shadow-sm font-medium">
                    <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline">Exportar PDF</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Navegación de Pestañas -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <!-- Indicador de Nube -->
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>

            <div class="flex space-x-8 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex items-center gap-2 py-4 px-1 border-b-2 font-medium text-sm transition border-blue-600 text-blue-600">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen General
                </button>
                <button onclick="switchTab('ingreso')" id="tab-ingreso" class="flex items-center gap-2 py-4 px-1 border-b-2 font-medium text-sm transition border-transparent text-gray-500 hover:text-gray-700">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Carga Mensual
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="flex items-center gap-2 py-4 px-1 border-b-2 font-medium text-sm transition border-transparent text-gray-500 hover:text-gray-700">
                    <i data-lucide="store" class="w-4 h-4"></i> Historial
                </button>
            </div>
        </div>
    </div>

    <!-- Contenedor Principal -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content">
        <!-- El contenido se inyecta por JS -->
    </main>

    <!-- MÓDULO JS CON FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==============================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };
        // ==============================================================================

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.error("Falta configurar Firebase.", e);
        }

        const appId = 'mi-tablero-ceo-empresa'; 

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        let chartInstances = {}; 

        const PUNTOS_VENTA = { deposito: 'Depósito', concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);

        let formState = {
            mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '',
            ventas: '', objetivo: '', tickets: '', productosVendidos: '',
            stock: [{ categoria: '', cantidad: '', valor: '' }]
        };

        if (auth) {
            signInAnonymously(auth).catch((error) => console.error("Error de conexión:", error));

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 flex items-center gap-1";
                    lucide.createIcons();

                    const recordsRef = collection(db, 'registros_mensuales');
                    onSnapshot(recordsRef, (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => {
                            appData.push({ dbId: documento.id, ...documento.data() });
                        });
                        render();
                    }, (error) => {
                        console.error("Error sincronizando:", error);
                    });
                } else {
                    statusEl.innerHTML = '<i data-lucide="cloud-off" class="w-4 h-4"></i> Desconectado';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-red-500 flex items-center gap-1";
                    lucide.createIcons();
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(val);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
        const formatNumber = (val) => new Intl.NumberFormat('es-AR').format(val);
        window.formatCurrency = formatCurrency;

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim();
            str = str.replace(/[$$\s]/g, '');
            
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            
            if (lastComma > lastDot) {
                str = str.replace(/\./g, '').replace(',', '.');
            } else if (lastDot > lastComma && lastComma !== -1) {
                str = str.replace(/,/g, '');
            } else if (lastComma !== -1 && lastDot === -1) {
                str = str.replace(',', '.');
            } else if (lastDot !== -1 && lastComma === -1) {
                str = str.replace(/\./g, '');
            }
            
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => {
            activeTab = tab;
            ['dashboard', 'ingreso', 'historial'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) btn.className = "flex items-center gap-2 py-4 px-1 border-b-2 font-medium text-sm transition border-blue-600 text-blue-600";
                else btn.className = "flex items-center gap-2 py-4 px-1 border-b-2 font-medium text-sm transition border-transparent text-gray-500 hover:text-gray-700";
            });
            render();
        };

        window.exportBackup = () => {
            const dataStr = JSON.stringify(appData);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `Backup_CompanyAnalytics_${new Date().toISOString().slice(0,10)}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        };

        window.importBackup = async (event) => {
            if (!currentUser) return alert('Debes esperar a que la nube esté conectada.');
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        alert("Sincronizando registros con la nube... (Esto puede tomar unos segundos)");
                        for (const record of importedData) {
                            const docId = record.dbId || Date.now().toString() + Math.floor(Math.random() * 1000).toString();
                            const docRef = doc(db, 'registros_mensuales', docId);
                            await setDoc(docRef, record);
                        }
                        alert('¡Datos restaurados y subidos a la nube exitosamente!');
                    } else { alert('El archivo no tiene el formato correcto.'); }
                } catch (error) { alert('Error al leer el archivo. Asegúrate de que sea un .json válido.'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        };

        window.deleteRecord = async (dbId) => {
            if (!currentUser) return alert('Conexión a la nube requerida para eliminar.');
            if(confirm('¿Seguro que deseas eliminar este registro de la base de datos general?')) {
                const docRef = doc(db, 'registros_mensuales', dbId);
                await deleteDoc(docRef);
            }
        };

        window.handleFormChange = (field, value) => { formState[field] = value; if (field === 'puntoVenta') render(); };
        
        window.handleStockChange = (index, field, value) => { 
            formState.stock[index][field] = value; 
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const sumEl = document.getElementById('stock-sum-display');
            if(sumEl) sumEl.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        
        window.addStockRow = () => { formState.stock.push({ categoria: '', cantidad: '', valor: '' }); window.renderFormStockRows(); };
        window.removeStockRow = (index) => { formState.stock.splice(index, 1); window.renderFormStockRows(); };

        window.submitForm = async (e) => {
            e.preventDefault();
            if (!currentUser) return alert("Por favor, espera a que el sistema conecte con la nube.");

            const pv = formState.puntoVenta;
            
            const stockLimpio = formState.stock.filter(s => s.categoria && (s.cantidad !== '' || s.valor !== '')).map(s => ({
                categoria: s.categoria, 
                cantidad: window.parseInputNumber(s.cantidad),
                valor: window.parseInputNumber(s.valor)
            }));

            const totalMercaderiaCalculado = stockLimpio.reduce((acc, item) => acc + item.valor, 0);

            const newRecord = {
                mes: formState.mes, año: formState.año, puntoVenta: pv,
                cotizacionDolar: window.parseInputNumber(formState.cotizacionDolar) || 1,
                valorMercaderia: totalMercaderiaCalculado,
                ventas: pv === 'deposito' ? 0 : window.parseInputNumber(formState.ventas),
                objetivo: pv === 'deposito' ? 0 : window.parseInputNumber(formState.objetivo),
                tickets: pv === 'deposito' ? 0 : window.parseInputNumber(formState.tickets),
                productosVendidos: pv === 'deposito' ? 0 : window.parseInputNumber(formState.productosVendidos),
                stock: stockLimpio
            };
            
            const docId = Date.now().toString(); 
            const docRef = doc(db, 'registros_mensuales', docId);
            
            await setDoc(docRef, newRecord);
            
            formState.ventas = ''; formState.objetivo = ''; 
            formState.tickets = ''; formState.productosVendidos = ''; formState.stock = [{ categoria: '', cantidad: '', valor: '' }];
            
            window.switchTab('historial');
        };

        window.renderFormStockRows = () => {
            const container = document.getElementById('stock-rows-container');
            if(!container) return;
            
            container.innerHTML = formState.stock.map((item, idx) => `
                <div class="flex gap-2 items-center">
                    <div class="flex-[2]">
                        <input type="text" placeholder="Ej: Línea Blanca" class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm" value="${item.categoria}" onchange="handleStockChange(${idx}, 'categoria', this.value)" required />
                    </div>
                    <div class="flex-1">
                        <input type="text" inputmode="decimal" placeholder="Cant." class="w-full p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-center text-sm" value="${item.cantidad}" onchange="handleStockChange(${idx}, 'cantidad', this.value)" required />
                    </div>
                    <div class="flex-[1.5] relative">
                        <span class="absolute left-2.5 top-2.5 text-gray-500 font-bold text-sm">$</span>
                        <input type="text" inputmode="decimal" placeholder="Pegar Excel..." class="w-full pl-6 p-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-medium" value="${item.valor}" onchange="handleStockChange(${idx}, 'valor', this.value)" required />
                    </div>
                    ${formState.stock.length > 1 ? `<button type="button" onclick="removeStockRow(${idx})" class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : '<div class="w-9"></div>'}
                </div>
            `).join('');
            lucide.createIcons();
            
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const sumEl = document.getElementById('stock-sum-display');
            if(sumEl) sumEl.innerText = 'Total Automático: ' + formatCurrency(suma);
        };

        function getDiagnosticData() {
            if (appData.length === 0) return null;

            const uniquePeriods = Array.from(new Set(appData.map(d => `${d.año}-${d.mes}`))).sort((a, b) => {
                const [yearA, monthA] = a.split('-'); const [yearB, monthB] = b.split('-');
                if (yearA !== yearB) return Number(yearA) - Number(yearB);
                return monthOrder[monthA] - monthOrder[monthB];
            });

            if (uniquePeriods.length === 0) return null;

            const lastPeriodStr = uniquePeriods[uniquePeriods.length - 1];
            const prevPeriodStr = uniquePeriods.length > 1 ? uniquePeriods[uniquePeriods.length - 2] : null;

            const [lastYear, lastMonth] = lastPeriodStr.split('-');
            const [prevYear, prevMonth] = prevPeriodStr ? prevPeriodStr.split('-') : [null, null];

            const lastMonthData = appData.filter(d => d.mes === lastMonth && d.año === lastYear);
            const prevMonthData = appData.filter(d => d.mes === prevMonth && d.año === prevYear);

            let totalVentas = 0, totalObjetivo = 0, totalTickets = 0, totalProductos = 0;
            let totalMercaderiaGlobal = 0, cotizacionActual = 1;
            
            const capitalPorCategoria = {};

            lastMonthData.forEach(d => {
                totalMercaderiaGlobal += (Number(d.valorMercaderia) || 0);
                if (d.cotizacionDolar > 1) cotizacionActual = d.cotizacionDolar;

                if (d.puntoVenta !== 'deposito') {
                    totalVentas += d.ventas; 
                    totalObjetivo += d.objetivo;
                    totalTickets += d.tickets;
                    totalProductos += d.productosVendidos;
                }
                
                if (d.stock) {
                    d.stock.forEach(item => {
                        const val = Number(item.valor) || 0;
                        if(val > 0) {
                            if (!capitalPorCategoria[item.categoria]) capitalPorCategoria[item.categoria] = 0;
                            capitalPorCategoria[item.categoria] += val;
                        }
                    });
                }
            });

            const totalVentasPrev = prevMonthData.filter(d => d.puntoVenta !== 'deposito').reduce((acc, curr) => acc + curr.ventas, 0);
            const percGrowth = totalVentasPrev > 0 ? ((totalVentas - totalVentasPrev) / totalVentasPrev) * 100 : 0;

            const cumplimiento = totalObjetivo > 0 ? (totalVentas / totalObjetivo) * 100 : 0;
            const ticketPromedio = totalTickets > 0 ? totalVentas / totalTickets : 0;
            const unidadesTicket = totalTickets > 0 ? totalProductos / totalTickets : 0;

            const bestLocalData = lastMonthData.filter(d => d.puntoVenta !== 'deposito').sort((a, b) => b.ventas - a.ventas)[0];
            const bestLocalName = bestLocalData ? PUNTOS_VENTA[bestLocalData.puntoVenta] : '-';
            const totalStockActual = lastMonthData.reduce((acc, row) => acc + row.stock.reduce((s, item) => s + item.cantidad, 0), 0);

            const momIndividual = Object.keys(PUNTOS_VENTA).map(key => {
                const current = lastMonthData.find(d => d.puntoVenta === key);
                const prev = prevMonthData.find(d => d.puntoVenta === key);
                const isDeposito = key === 'deposito';

                const valCurrent = current ? (isDeposito ? current.valorMercaderia : current.ventas) : 0;
                const valPrev = prev ? (isDeposito ? prev.valorMercaderia : prev.ventas) : 0;
                const growth = valPrev > 0 ? ((valCurrent - valPrev) / valPrev) * 100 : (valCurrent > 0 ? 100 : 0);

                return {
                    key,
                    nombre: PUNTOS_VENTA[key],
                    isDeposito,
                    valCurrent,
                    valPrev,
                    growth
                };
            });

            const prevStockMap = {};
            prevMonthData.forEach(row => {
                row.stock.forEach(item => { prevStockMap[`${row.puntoVenta}-${item.categoria}`] = item.cantidad; });
            });

            let stockRotation = [];
            lastMonthData.forEach(row => {
                row.stock.forEach(item => {
                    const cantAnt = prevStockMap[`${row.puntoVenta}-${item.categoria}`] || 0;
                    stockRotation.push({
                        sucursal: PUNTOS_VENTA[row.puntoVenta],
                        categoria: item.categoria,
                        actual: item.cantidad,
                        variacion: item.cantidad - cantAnt
                    });
                });
            });
            stockRotation = stockRotation.sort((a, b) => a.variacion - b.variacion).slice(0, 5);
            
            const topCategoriasValor = Object.keys(capitalPorCategoria)
                .map(cat => ({ categoria: cat, valor: capitalPorCategoria[cat] }))
                .sort((a, b) => b.valor - a.valor);

            return {
                lastMonthString: `${lastMonth} ${lastYear}`, prevMonthString: prevMonth ? `${prevMonth} ${prevYear}` : '-',
                totalVentas, percGrowth, cumplimiento, ticketPromedio, unidadesTicket,
                bestLocalName, totalStockActual, totalMercaderiaGlobal, cotizacionActual,
                lastMonthData, prevMonthData, stockRotation, topCategoriasValor, lastMonth, prevMonth,
                momIndividual
            };
        }

        function render() {
            const main = document.getElementById('main-content');
            const exportBtn = document.getElementById('export-btn-container');
            
            if (exportBtn) exportBtn.style.display = 'none';
            
            if (activeTab === 'dashboard') {
                const diag = getDiagnosticData();
                if (!diag) {
                    main.innerHTML = `
                        <div class="text-center py-20 bg-white rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto mt-10">
                            <i data-lucide="bar-chart-2" class="mx-auto w-16 h-16 text-fuchsia-400 mb-4"></i>
                            <h3 class="text-2xl font-bold text-gray-800">El tablero está listo</h3>
                            <p class="text-gray-500 mt-2">La base de datos en la nube está conectada y vacía.<br>Ve a la pestaña <strong>Carga Mensual</strong> para registrar tu facturación.</p>
                        </div>`;
                } else {
                    if (exportBtn) exportBtn.style.display = 'block';
                    main.innerHTML = `
                        <div class="space-y-6 animate-in fade-in duration-500">
                            <!-- KPIs -->
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4">
                                <div class="bg-white p-5 rounded-xl shadow-sm flex items-center gap-4 border-l-4 border-emerald-500">
                                    <div class="p-3 bg-emerald-100 text-emerald-600 rounded-lg"><i data-lucide="trending-up" class="w-6 h-6"></i></div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Ventas Locales (${diag.lastMonthString})</p>
                                        <h3 class="text-2xl font-bold text-gray-800">${formatCurrency(diag.totalVentas)}</h3>
                                        <p class="text-xs font-medium text-emerald-600 mt-0.5">${formatUSD(diag.totalVentas / diag.cotizacionActual)}</p>
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-xl shadow-sm flex items-center gap-4 border-l-4 border-indigo-500">
                                    <div class="p-3 bg-indigo-100 text-indigo-600 rounded-lg"><i data-lucide="archive" class="w-6 h-6"></i></div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Capital Mercadería</p>
                                        <h3 class="text-2xl font-bold text-gray-800">${formatCurrency(diag.totalMercaderiaGlobal)}</h3>
                                        <p class="text-xs font-medium text-indigo-600 mt-0.5">${formatUSD(diag.totalMercaderiaGlobal / diag.cotizacionActual)}</p>
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-xl shadow-sm flex items-center gap-4 border-l-4 border-amber-500">
                                    <div class="p-3 bg-amber-100 text-amber-600 rounded-lg"><i data-lucide="shopping-cart" class="w-6 h-6"></i></div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Ticket Promedio</p>
                                        <h3 class="text-2xl font-bold text-gray-800">${formatCurrency(diag.ticketPromedio)}</h3>
                                        <p class="text-xs font-medium text-amber-600 mt-0.5">${formatUSD(diag.ticketPromedio / diag.cotizacionActual)}</p>
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-xl shadow-sm flex items-center gap-4 border-l-4 border-blue-500">
                                    <div class="p-3 bg-blue-100 text-blue-600 rounded-lg"><i data-lucide="target" class="w-6 h-6"></i></div>
                                    <div class="w-full">
                                        <p class="text-sm text-gray-500 font-medium">Cumplimiento Meta</p>
                                        <h3 class="text-2xl font-bold text-gray-800">${diag.cumplimiento.toFixed(1)}%</h3>
                                        <div class="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                                            <div class="h-1.5 rounded-full ${diag.cumplimiento >= 100 ? 'bg-green-500' : 'bg-blue-500'}" style="width: ${Math.min(diag.cumplimiento, 100)}%"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Gráficos de Composición -->
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 print-break-inside-avoid">
                                <div class="bg-white p-6 rounded-xl shadow-sm">
                                    <h3 class="text-lg font-bold text-gray-800 mb-1">Composición de Ventas</h3>
                                    <p class="text-sm text-gray-500 mb-6">Aporte de cada local a la facturación total.</p>
                                    <div class="h-[250px] relative"><canvas id="chartVentasMix"></canvas></div>
                                </div>
                                <div class="bg-white p-6 rounded-xl shadow-sm">
                                    <h3 class="text-lg font-bold text-gray-800 mb-1">Distribución del Capital</h3>

            } else if (activeTab === 'ingreso') {

                                         'text-amber-900 border-amber-400 focus:ring-amber-200';
                                         
                const bgHighlightClass = pv === 'tendens' ? 'bg-purple-50 border-purple-200' :

                main.innerHTML = `

                                <div class="bg-amber-50 p-6 rounded-xl border border-amber-100">

                            <div class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 ${!isDeposito ? 'mt-4' : ''}">

                                        <p id="stock-sum-display" class="text-lg font-extrabold text-emerald-700 mt-2 bg-emerald-100 inline-block px-3 py-1 rounded">Total Automático: $0</p>

            } else if (activeTab === 'historial') {

                            <div class="flex items-center gap-3">

                                    <input type="file" accept=".json" class="hidden" onchange="importBackup(event)">
                                </label>
                                <button onclick="exportBackup()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition shadow-sm font-medium flex items-center gap-2 text-sm">
                                    <i data-lucide="download" class="w-4 h-4"></i> Descargar Copia

                                        return monthOrder[b.mes] - monthOrder[a.mes];
                                    }).map(row => {
                                        const valUSD = row.valorMercaderia / (row.cotizacionDolar || 1);
                                        const rowColorClass = row.puntoVenta === 'tendens' ? 'text-purple-600' : 
                                                              (row.puntoVenta === 'concordia' || row.puntoVenta === 'chajari') ? 'text-pink-600' :

                                        return `

                                                <div class="font-bold text-indigo-700">${formatCurrency(row.valorMercaderia || 0)}</div>

                    </div>
                `;

            lucide.createIcons();
        }

        // --- FORMATEADOR DE EJES INTELIGENTE ---
        const formatAxis = (value) => {
            if (value === 0) return '$0';
            let absVal = Math.abs(value);
            if (absVal >= 1000000) return (value < 0 ? '-' : '') + '$' + (absVal / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (absVal >= 1000) return (value < 0 ? '-' : '') + '$' + (absVal / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
            return (value < 0 ? '-' : '') + '$' + absVal;
        };
        window.formatAxis = formatAxis;

        // --- GRÁFICOS (Chart.js) ---
        function initCharts(diag) {
            if (chartInstances.mom) chartInstances.mom.destroy();
            if (chartInstances.yoy) chartInstances.yoy.destroy();
            if (chartInstances.ventasMix) chartInstances.ventasMix.destroy();
            if (chartInstances.capitalMix) chartInstances.capitalMix.destroy();
            if (chartInstances.capitalCat) chartInstances.capitalCat.destroy();

            const labelsLocales = Object.keys(PUNTOS_VENTA).filter(k => k !== 'deposito').map(k => PUNTOS_VENTA[k]);
            const dataVentasMix = Object.keys(PUNTOS_VENTA).filter(k => k !== 'deposito').map(k => {
                const row = diag.lastMonthData.find(d => d.puntoVenta === k);
                return row ? row.ventas : 0;
            });

            const ctxVentas = document.getElementById('chartVentasMix').getContext('2d');
            chartInstances.ventasMix = new Chart(ctxVentas, {
                type: 'doughnut',
                data: {
                    labels: labelsLocales,
                    datasets: [{ data: dataVentasMix, backgroundColor: ['#db2777', '#c026d3', '#2563eb'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: function(c) { return ' ' + formatCurrency(c.raw); } } } } }
            });

            const labelsAll = Object.values(PUNTOS_VENTA);
            const dataCapitalMix = Object.keys(PUNTOS_VENTA).map(k => {
                const row = diag.lastMonthData.find(d => d.puntoVenta === k);
                return row ? row.valorMercaderia : 0;
            });

            const ctxCapital = document.getElementById('chartCapitalMix').getContext('2d');
            chartInstances.capitalMix = new Chart(ctxCapital, {
                type: 'doughnut',
                data: {
                    labels: labelsAll,
                    datasets: [{ data: dataCapitalMix, backgroundColor: ['#b45309', '#db2777', '#c026d3', '#2563eb'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: function(c) { return ' ' + formatCurrency(c.raw); } } } } }
            });

            // GRÁFICO: Capital por Categoría (Barras Horizontales)
            if (diag.topCategoriasValor.length > 0) {
                const catLabels = diag.topCategoriasValor.map(c => c.categoria);
                const catData = diag.topCategoriasValor.map(c => c.valor);
                
                const ctxCat = document.getElementById('chartCapitalCat').getContext('2d');
                chartInstances.capitalCat = new Chart(ctxCat, {
                    type: 'bar',
                    data: {
                        labels: catLabels,
                        datasets: [{ label: 'Valorización (ARS)', data: catData, backgroundColor: '#10b981', borderRadius: 4 }]
                    },
                    options: { 
                        indexAxis: 'y',
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c) { return ' ' + formatCurrency(c.raw); } } } }, 
                        scales: { x: { beginAtZero: true, ticks: { callback: window.formatAxis } } } 
                    }
                });
            }

            // Gráfico MoM Adaptado
            const momLabels = diag.momIndividual.map(d => d.nombre);
            const momPrevData = diag.momIndividual.map(d => d.valPrev);
            const momLastData = diag.momIndividual.map(d => d.valCurrent);

            const ctxMom = document.getElementById('chartMom').getContext('2d');
            chartInstances.mom = new Chart(ctxMom, {
                type: 'bar',
                data: {
                    labels: momLabels,
                    datasets: [
                        { label: diag.prevMonthString, data: momPrevData, backgroundColor: '#cbd5e1', borderRadius: 4 },
                        { label: diag.lastMonthString, data: momLastData, backgroundColor: '#3b82f6', borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: function(c) {
                                    const isDepo = c.label === 'Depósito';
                                    const prefix = isDepo ? 'Capital: ' : 'Facturación: ';
                                    return prefix + formatCurrency(c.raw);
                                }
                            }
                        }
                    }, 
                    scales: { y: { beginAtZero: true, ticks: { callback: window.formatAxis } } } 
                }
            });

            const yoyGrouped = {};
            appData.forEach(d => {
                if(d.puntoVenta === 'deposito') return;
                if(!yoyGrouped[d.mes]) yoyGrouped[d.mes] = { mes: d.mes };
                yoyGrouped[d.mes][d.año] = (yoyGrouped[d.mes][d.año] || 0) + d.ventas;
            });
            const yoyArray = Object.values(yoyGrouped).sort((a,b) => monthOrder[a.mes] - monthOrder[b.mes]);
            const yoyLabels = yoyArray.map(y => y.mes);
            const years = Array.from(new Set(appData.map(d => d.año))).sort();
            const colors = ['#94a3b8', '#3b82f6', '#10b981'];
            
            const datasetsYoy = years.map((y, idx) => ({
                label: `Año ${y}`,
                data: yoyArray.map(item => item[y] || 0),
                backgroundColor: colors[idx % colors.length],
                borderRadius: 4
            }));

            const ctxYoy = document.getElementById('chartYoy').getContext('2d');
            chartInstances.yoy = new Chart(ctxYoy, {
                type: 'bar',
                data: { labels: yoyLabels, datasets: datasetsYoy },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, ticks: { callback: window.formatAxis } } } }
            });
        }

        render();
    </script>
</body>
</html>
