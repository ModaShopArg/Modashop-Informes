<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas-Informes</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <!-- Configuración inicial de Tema para evitar parpadeos -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; color: black !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
        /* Transiciones suaves para el cambio de tema */
        body, div, header, nav, button, p, h2, h3, h4, span, td, th { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        
        .tab-active { border-bottom-width: 2px; border-color: #3b82f6; color: #3b82f6; font-weight: 600; }
        .dark .tab-active { border-color: #60a5fa; color: #60a5fa; }
        
        .subtab-active { background-color: #f1f5f9; color: #1e293b; border-color: #cbd5e1; }
        .dark .subtab-active { background-color: #334155; color: #f8fafc; border-color: #475569; }
        
        .month-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .month-card:hover { transform: translateY(-2px); border-color: #e2e8f0; }
        .dark .month-card:hover { border-color: #475569; }
        .month-card.active { border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
        .dark .month-card.active { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        .empty-chart-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); color: #94a3b8; font-size: 0.75rem; font-weight: 600; border-radius: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; pointer-events: none; }
        .dark .empty-chart-overlay { background: rgba(30, 41, 59, 0.85); color: #64748b; }
    </style>
</head>
<body class="bg-fuchsia-100 dark:bg-slate-950 font-sans text-gray-900 dark:text-gray-100 pb-12 min-h-screen">

    <!-- Botón Toggle de Tema (Esquina inferior derecha) -->
    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 bg-slate-800 dark:bg-white text-white dark:text-slate-800 rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center group">
        <i id="theme-icon-light" data-lucide="sun" class="w-6 h-6 hidden dark:block group-hover:rotate-45 transition-transform duration-500"></i>
        <i id="theme-icon-dark" data-lucide="moon" class="w-6 h-6 block dark:hidden group-hover:-rotate-12 transition-transform duration-500"></i>
    </button>

    <!-- Header -->
    <header class="bg-white dark:bg-slate-900 shadow-sm print-hidden border-b border-transparent dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between relative">
            <img src="logo.png" alt="Logo de la Empresa" class="h-16 object-contain bg-white/10 rounded-xl p-1" />
            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" id="btn-admin" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm font-medium text-sm">
                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>
                </button>
                <div id="export-btn-container" style="display: none;">
                    <button onclick="window.print()" class="flex items-center gap-2 bg-slate-800 dark:bg-slate-700 text-white px-4 py-2 rounded-lg hover:bg-slate-700 dark:hover:bg-slate-600 transition shadow-sm font-medium text-sm">
                        <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline">Exportar PDF</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Navegación Principal -->
    <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>
            <div class="flex space-x-6 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen
                </button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Carga Ventas
                </button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center gap-2">
                    <i data-lucide="package" class="w-4 h-4"></i> Carga Stock
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center gap-2">
                    <i data-lucide="store" class="w-4 h-4"></i> Historial
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Conexión
        let firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        if (isCanvasEnv) { firebaseConfig = JSON.parse(__firebase_config); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const canvasAppId = typeof __app_id !== 'undefined' ? __app_id : 'mi-tablero';

        const getDbCollection = () => isCanvasEnv ? collection(db, 'artifacts', canvasAppId, 'public', 'data', 'registros_mensuales') : collection(db, 'registros_mensuales');
        const getDbDoc = (docId) => isCanvasEnv ? doc(db, 'artifacts', canvasAppId, 'public', 'data', 'registros_mensuales', docId) : doc(db, 'registros_mensuales', docId);

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        let dashboardSubTab = 'comercial';
        let selectedPeriod = null; 
        let isAdmin = false; 
        const ADMIN_PIN = "1234"; 
        let chartInstances = {}; 

        const PUNTOS_VENTA = { deposito: 'Depósito', concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);

        // --- SISTEMA DE TEMA CLARO/OSCURO ---
        window.toggleTheme = () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            render(); // Re-renderizamos para que los gráficos actualicen sus colores
        };

        window.toggleAdmin = () => {
            if (isAdmin) { isAdmin = false; if (activeTab === 'cargaVentas' || activeTab === 'cargaStock') activeTab = 'dashboard'; render(); }
            else {
                const pin = prompt("🔐 MODO SEGURO ACTIVO\n\nIngresa el PIN para habilitar la edición:");
                if (pin === ADMIN_PIN) { isAdmin = true; render(); }
                else if (pin !== null) alert("❌ PIN incorrecto.");
            }
        };

        if (auth) {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (error) {
                    document.getElementById('cloud-status').innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4"></i> Bloqueado por Firebase';
                    document.getElementById('cloud-status').className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-red-500 flex items-center gap-1";
                    lucide.createIcons();
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1";
                    lucide.createIcons();
                    
                    onSnapshot(getDbCollection(), (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => { appData.push({ dbId: documento.id, ...documento.data() }); });
                        if (!selectedPeriod && appData.length > 0) {
                            const periods = getSortedPeriods();
                            selectedPeriod = periods[0].id;
                        }
                        render();
                    }, (err) => {
                        statusEl.innerHTML = '<i data-lucide="lock" class="w-4 h-4"></i> Sin Permisos';
                        statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-red-500 flex items-center gap-1";
                        lucide.createIcons();
                    });
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 2 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(val || 0);
        const formatAxis = (value) => {
            if (Math.abs(value) < 1) return '$0';
            let absVal = Math.abs(value);
            if (absVal >= 1000000) return '$' + (absVal / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (absVal >= 1000) return '$' + (absVal / 1000).toFixed(0) + 'k';
            return '$' + absVal.toLocaleString('es-AR');
        };

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };
        window.switchDashboardSubTab = (sub) => { dashboardSubTab = sub; render(); };
        window.setSelectedPeriod = (id) => { selectedPeriod = id; render(); };

        let formState = {
            mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '',
            ventas: '', objetivo: '', tickets: '', ticketsMañana: '', productosVendidos: '',
            stock: [{ categoria: '', cantidad: '', valor: '' }]
        };

        window.handleFormChange = (field, value) => { formState[field] = value; if (field === 'puntoVenta') render(); };
        window.handleStockChange = (idx, field, val) => { 
            formState.stock[idx][field] = val; 
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formState.stock.push({ categoria: '', cantidad: '', valor: '' }); window.renderFormStockRows(); };
        window.removeStockRow = (idx) => { formState.stock.splice(idx, 1); window.renderFormStockRows(); };

        window.submitGenericForm = async (e, type) => {
            e.preventDefault();
            if (!currentUser) return;
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            let dataToSave = { mes: formState.mes, año: formState.año, puntoVenta: formState.puntoVenta, cotizacionDolar: window.parseInputNumber(formState.cotizacionDolar) || 1 };
            if (type === 'ventas') {
                dataToSave.ventas = window.parseInputNumber(formState.ventas);
                dataToSave.objetivo = window.parseInputNumber(formState.objetivo);
                dataToSave.tickets = window.parseInputNumber(formState.tickets);
                dataToSave.ticketsMañana = window.parseInputNumber(formState.ticketsMañana);
                dataToSave.ticketsTarde = Math.max(0, dataToSave.tickets - dataToSave.ticketsMañana);
                dataToSave.productosVendidos = window.parseInputNumber(formState.productosVendidos);
            } else {
                const stockLimpio = formState.stock.filter(s => s.categoria).map(s => ({
                    categoria: s.categoria, cantidad: window.parseInputNumber(s.cantidad), valor: window.parseInputNumber(s.valor)
                }));
                dataToSave.stock = stockLimpio;
                dataToSave.valorMercaderia = stockLimpio.reduce((acc, item) => acc + item.valor, 0);
            }
            await setDoc(getDbDoc(docId), dataToSave, { merge: true });
            if(type === 'ventas') { formState.ventas=''; formState.objetivo=''; formState.tickets=''; formState.ticketsMañana=''; formState.productosVendidos=''; }
            else { formState.stock = [{ categoria: '', cantidad: '', valor: '' }]; }
            window.switchTab('historial');
        };

        window.deleteRecord = async (dbId) => { if(confirm('¿Eliminar registro completo?')) await deleteDoc(getDbDoc(dbId)); };

        function getSortedPeriods() {
            const periods = Array.from(new Set(appData.map(d => `${d.mes}-${d.año}`)));
            return periods.map(p => {
                const [m, a] = p.split('-');
                const monthEntries = appData.filter(d => d.mes === m && d.año === a);
                const monthCap = monthEntries.reduce((acc, curr) => acc + (curr.valorMercaderia || 0), 0);
                const monthDol = monthEntries.reduce((max, curr) => Math.max(max, curr.cotizacionDolar || 0), 1);
                return { id: p, mes: m, año: a, capital: monthCap, dolar: monthDol };
            }).sort((a, b) => (a.año !== b.año) ? Number(b.año) - Number(a.año) : monthOrder[b.mes] - monthOrder[a.mes]);
        }

        function getDiagnosticData() {
            if (appData.length === 0 || !selectedPeriod) return null;
            const periods = getSortedPeriods();
            const currIdx = periods.findIndex(p => p.id === selectedPeriod);
            const [lastMonth, lastYear] = selectedPeriod.split('-');
            const prevPeriod = periods[currIdx + 1] || null;
            const [prevMonth, prevYear] = prevPeriod ? prevPeriod.id.split('-') : [null, null];
            
            const lastMonthData = appData.filter(d => d.mes === lastMonth && d.año === lastYear);
            const prevMonthData = prevPeriod ? appData.filter(d => d.mes === prevMonth && d.año === prevYear) : [];

            let tV = 0, tObj = 0, tT = 0, tP = 0, tM = 0, cotiz = 1;
            let tM_prev = 0, cotiz_prev = 1;
            let tT_manana = 0, tT_tarde = 0;
            const capPorCat = {};

            lastMonthData.forEach(d => {
                tM += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz) cotiz = Number(d.cotizacionDolar);
                if (d.puntoVenta !== 'deposito') { 
                    tV += (d.ventas || 0); tObj += (d.objetivo || 0); tT += (d.tickets || 0); tP += (d.productosVendidos || 0); 
                    tT_manana += (d.ticketsMañana || 0); tT_tarde += (d.ticketsTarde || 0);
                }
                if (d.stock) d.stock.forEach(i => { 
                    if(!capPorCat[i.categoria]) capPorCat[i.categoria] = {v:0, c:0}; 
                    capPorCat[i.categoria].v += i.valor; capPorCat[i.categoria].c += i.cantidad; 
                });
            });

            prevMonthData.forEach(d => {
                tM_prev += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz_prev) cotiz_prev = Number(d.cotizacionDolar);
            });

            const momIndiv = Object.keys(PUNTOS_VENTA).map(key => {
                const cur = lastMonthData.find(d => d.puntoVenta === key);
                const pre = prevMonthData.find(d => d.puntoVenta === key);
                const isD = key === 'deposito';
                const vC_sales = cur ? (cur.ventas || 0) : 0;
                const vP_sales = pre ? (pre.ventas || 0) : 0;
                const vC_cap = cur ? (cur.valorMercaderia || 0) : 0;
                const vP_cap = pre ? (pre.valorMercaderia || 0) : 0;
                const growth = isD ? (vP_cap > 0 ? ((vC_cap-vP_cap)/vP_cap)*100 : 0) : (vP_sales > 0 ? ((vC_sales-vP_sales)/vP_sales)*100 : 0);
                return { key, nombre: PUNTOS_VENTA[key], vC_sales, vP_sales, vC_cap, vP_cap, growth, obj: cur?.objetivo || 0, tickets: cur?.tickets || 0, units: cur?.productosVendidos || 0, isDepo: isD };
            });

            return {
                lastMonthString: `${lastMonth} ${lastYear}`, prevMonthString: prevMonth ? `${prevMonth} ${prevYear}` : 'N/A',
                tV, tM, tM_prev, cotiz, cotiz_prev, cumplimiento: tObj > 0 ? (tV/tObj)*100 : 0, ticketPromedio: tT > 0 ? tV/tT : 0, unidadesTicket: tT > 0 ? tP/tT : 0,
                tT_manana, tT_tarde, momIndiv, lastMonthData,
                catStats: Object.keys(capPorCat).map(k => ({name: k, val: capPorCat[k].v, avg: capPorCat[k].c > 0 ? capPorCat[k].v/capPorCat[k].c : 0})).sort((a,b)=>b.val-a.val)
            };
        }

        window.renderFormStockRows = () => {
            const container = document.getElementById('stock-rows-container');
            if(!container) return;
            container.innerHTML = formState.stock.map((item, idx) => `
                <div class="flex gap-2 items-center">
                    <div class="flex-[2]"><input type="text" placeholder="Rubro" class="w-full p-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-lg text-sm text-gray-900 dark:text-white" value="${item.categoria}" onchange="handleStockChange(${idx}, 'categoria', this.value)" required /></div>
                    <div class="flex-1"><input type="text" placeholder="Cant." class="w-full p-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-lg text-center text-sm text-gray-900 dark:text-white" value="${item.cantidad}" onchange="handleStockChange(${idx}, 'cantidad', this.value)" required /></div>
                    <div class="flex-[1.5] relative"><span class="absolute left-2 top-2 text-gray-400 text-sm">$</span><input type="text" placeholder="Valor" class="w-full pl-5 p-2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-lg text-sm font-medium text-gray-900 dark:text-white" value="${item.valor}" onchange="handleStockChange(${idx}, 'valor', this.value)" required /></div>
                    ${formState.stock.length > 1 ? `<button type="button" onclick="removeStockRow(${idx})" class="p-2 text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '<div class="w-8"></div>'}
                </div>
            `).join('');
            lucide.createIcons();
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };

        function render() {
            const main = document.getElementById('main-content');
            
            const tabVentas = document.getElementById('tab-cargaVentas');
            const tabStock = document.getElementById('tab-cargaStock');
            if(tabVentas) tabVentas.style.display = isAdmin ? 'flex' : 'none';
            if(tabStock) tabStock.style.display = isAdmin ? 'flex' : 'none';

            const btnAdmin = document.getElementById('btn-admin');
            if (btnAdmin) {
                btnAdmin.innerHTML = isAdmin ? `<i data-lucide="unlock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Edición</span>` : `<i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>`;
                btnAdmin.className = isAdmin 
                    ? "flex items-center gap-2 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 px-4 py-2 rounded-lg hover:bg-emerald-200 dark:hover:bg-emerald-900/50 transition shadow-sm font-medium text-sm" 
                    : "flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm font-medium text-sm";
            }

            const nav = ['dashboard', 'cargaVentas', 'cargaStock', 'historial'];
            nav.forEach(t => { 
                const el = document.getElementById(`tab-${t}`); 
                if(el) el.className = (t === activeTab) ? "tab-active py-4 px-1 text-sm flex items-center gap-2" : "py-4 px-1 text-sm text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center gap-2"; 
            });

            if (activeTab === 'dashboard') {
                const periods = getSortedPeriods();
                const d = getDiagnosticData();

            }

            if (document.getElementById('chartCapitalMix')) {
                chartCfg('chartCapitalMix', 'doughnut', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: ['#64748b', '#0284c7', '#16a34a', '#7c3aed'], borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartRubroAvg', 'bar', { labels: d.catStats.map(c=>c.name), datasets: [{ label: 'Valor Prom. Unidad', data: d.catStats.map(c=>c.avg), backgroundColor: '#10b981', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartMomCapital', 'bar', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ label: d.prevMonthString, data: d.momIndiv.map(m=>m.vP_cap), backgroundColor: isDark ? '#475569' : '#cbd5e1', borderRadius: 4 }, { label: d.lastMonthString, data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: '#3b82f6', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
            }
        }
        render();
    </script>
</body>
</html>
