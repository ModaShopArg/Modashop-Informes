<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas-Informes</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            magenta: '#EC008C', 
                            black: '#1D1D1B',   
                            gray: '#878787',    
                            light: '#fdf2f8'    
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { background-color: white !important; color: black !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
        body, div, header, nav, button, p, h2, h3, h4, span, td, th { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        
        .tab-active { border-bottom-width: 2px; border-color: #EC008C; color: #EC008C; font-weight: 700; }
        .dark .tab-active { border-color: #EC008C; color: #EC008C; }
        
        .subtab-active { background-color: #EC008C; color: #ffffff; border-color: #EC008C; }
        .dark .subtab-active { background-color: #EC008C; color: #ffffff; border-color: #EC008C; }
        
        .month-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .month-card:hover { transform: translateY(-2px); border-color: #e2e8f0; }
        .dark .month-card:hover { border-color: #334155; }
        .month-card.active { border-color: #EC008C; background-color: #fdf2f8; box-shadow: 0 10px 15px -3px rgba(236, 0, 140, 0.1); }
        .dark .month-card.active { border-color: #EC008C; background-color: rgba(236, 0, 140, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        .empty-chart-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(241,245,249,0.85); color: #878787; font-size: 0.75rem; font-weight: 700; border-radius: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; pointer-events: none; z-index: 10; }
        .dark .empty-chart-overlay { background: rgba(15, 23, 42, 0.85); color: #878787; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-brand-black dark:text-gray-100 pb-12 min-h-screen">

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 bg-brand-black dark:bg-white text-white dark:text-brand-black rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center group border border-gray-700 dark:border-gray-200">
        <i id="theme-icon-light" data-lucide="sun" class="w-6 h-6 hidden dark:block group-hover:rotate-45 transition-transform duration-500"></i>
        <i id="theme-icon-dark" data-lucide="moon" class="w-6 h-6 block dark:hidden group-hover:-rotate-12 transition-transform duration-500"></i>
    </button>

    <header class="bg-white dark:bg-slate-900 shadow-sm print-hidden border-b border-gray-100 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between relative">
            <img src="logo.png" alt="Logo de la Empresa" class="h-16 object-contain bg-white/10 rounded-xl p-1" />
            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" id="btn-admin" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm font-bold text-sm">
                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Modo Lectura</span>
                </button>
                <div id="export-btn-container" style="display: none;">
                    <button onclick="window.print()" class="flex items-center gap-2 bg-brand-black text-white px-4 py-2 rounded-lg hover:bg-black transition shadow-sm font-bold text-sm">
                        <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline">Exportar PDF</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-10 print-hidden shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div id="cloud-status" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-amber-500 flex items-center gap-1">
                <i data-lucide="cloud-off" class="w-4 h-4"></i> Conectando...
            </div>
            <div class="flex space-x-6 justify-center" id="tab-navigation">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Resumen
                </button>
                <button onclick="switchTab('cargaVentas')" id="tab-cargaVentas" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Carga Ventas
                </button>
                <button onclick="switchTab('cargaStock')" id="tab-cargaStock" style="display:none;" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="package" class="w-4 h-4"></i> Carga Stock
                </button>
                <button onclick="switchTab('historial')" id="tab-historial" class="py-4 px-1 text-sm transition text-gray-500 dark:text-slate-400 hover:text-brand-magenta dark:hover:text-brand-magenta flex items-center gap-2 font-bold">
                    <i data-lucide="store" class="w-4 h-4"></i> Historial
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8" id="main-content"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {
            apiKey: "AIzaSyB4X4-HY_QTD9_4LGO244mGJidMdSA7lrA",
            authDomain: "tablero-valorizado-a6c2d.firebaseapp.com",
            projectId: "tablero-valorizado-a6c2d",
            storageBucket: "tablero-valorizado-a6c2d.firebasestorage.app",
            messagingSenderId: "66788546050",
            appId: "1:66788546050:web:e3b8a5fe79f3327b77b91b"
        };
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        if (isCanvasEnv) { firebaseConfig = JSON.parse(__firebase_config); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const canvasAppId = typeof __app_id !== 'undefined' ? __app_id : 'mi-tablero';

        const getDbCollection = () => isCanvasEnv ? collection(db, 'artifacts', canvasAppId, 'public', 'data', 'registros_mensuales') : collection(db, 'registros_mensuales');
        const getDbDoc = (docId) => isCanvasEnv ? doc(db, 'artifacts', canvasAppId, 'public', 'data', 'registros_mensuales', docId) : doc(db, 'registros_mensuales', docId);

        let currentUser = null;
        let appData = [];
        let activeTab = 'dashboard';
        let dashboardSubTab = 'comercial';
        let selectedPeriod = null; 
        let isAdmin = false; 
        const ADMIN_PIN = "292708"; 
        let chartInstances = {}; 

        const PUNTOS_VENTA = { deposito: 'Depósito', concordia: 'Local Concordia', chajari: 'Local Chajarí', tendens: 'Tendens' };
        const monthOrder = { 'Enero': 1, 'Febrero': 2, 'Marzo': 3, 'Abril': 4, 'Mayo': 5, 'Junio': 6, 'Julio': 7, 'Agosto': 8, 'Septiembre': 9, 'Octubre': 10, 'Noviembre': 11, 'Diciembre': 12 };
        const mesesList = Object.keys(monthOrder);

        window.toggleTheme = () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            render(); 
        };

        window.toggleAdmin = () => {
            if (isAdmin) { isAdmin = false; if (activeTab === 'cargaVentas' || activeTab === 'cargaStock') activeTab = 'dashboard'; render(); }
            else {
                const pin = prompt("🔐 MODO SEGURO ACTIVO\n\nIngresa el PIN para habilitar la edición:");
                if (pin === ADMIN_PIN) { isAdmin = true; render(); }
                else if (pin !== null) alert("❌ PIN incorrecto.");
            }
        };

        if (auth) {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (error) {
                    document.getElementById('cloud-status').innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4"></i> Bloqueado';
                    document.getElementById('cloud-status').className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-red-500 flex items-center gap-1";
                    lucide.createIcons();
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('cloud-status');
                if (user) {
                    statusEl.innerHTML = '<i data-lucide="cloud" class="w-4 h-4"></i> Nube Activa';
                    statusEl.className = "absolute left-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1";
                    lucide.createIcons();
                    
                    onSnapshot(getDbCollection(), (snapshot) => {
                        appData = [];
                        snapshot.forEach(documento => { appData.push({ dbId: documento.id, ...documento.data() }); });
                        if (!selectedPeriod && appData.length > 0) {
                            const periods = getSortedPeriods();
                            selectedPeriod = periods[0].id;
                        }
                        render();
                    });
                }
            });
        }

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 2 }).format(val || 0);
        const formatUSD = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('es-AR').format(val || 0);
        const formatAxis = (value) => {
            if (Math.abs(value) < 1) return '$0';
            let absVal = Math.abs(value);
            if (absVal >= 1000000) return '$' + (absVal / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (absVal >= 1000) return '$' + (absVal / 1000).toFixed(0) + 'k';
            return '$' + absVal.toLocaleString('es-AR');
        };

        window.parseInputNumber = (val) => {
            if (!val) return 0;
            let str = String(val).trim().replace(/[$$\s]/g, '');
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma && lastComma !== -1) str = str.replace(/,/g, '');
            else if (lastComma !== -1 && lastDot === -1) str = str.replace(',', '.');
            else if (lastDot !== -1 && lastComma === -1) str = str.replace(/\./g, '');
            return parseFloat(str) || 0;
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };
        window.switchDashboardSubTab = (sub) => { dashboardSubTab = sub; render(); };
        window.setSelectedPeriod = (id) => { selectedPeriod = id; render(); };

        let formState = {
            mes: 'Enero', año: new Date().getFullYear().toString(), puntoVenta: 'concordia', cotizacionDolar: '',
            ventas: '', ventasMañana: '', tickets: '', ticketsMañana: '', productosVendidos: '',
            stock: [{ categoria: '', cantidad: '', valor: '' }]
        };

        window.handleFormChange = (field, value) => { formState[field] = value; if (field === 'puntoVenta' || field === 'mes' || field === 'año') render(); };
        window.handleStockChange = (idx, field, val) => { 
            formState.stock[idx][field] = val; 
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };
        window.addStockRow = () => { formState.stock.push({ categoria: '', cantidad: '', valor: '' }); window.renderFormStockRows(); };
        window.removeStockRow = (idx) => { formState.stock.splice(idx, 1); window.renderFormStockRows(); };

        window.submitGenericForm = async (e, type) => {
            e.preventDefault();
            if (!currentUser) return;
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            let dataToSave = { mes: formState.mes, año: formState.año, puntoVenta: formState.puntoVenta, cotizacionDolar: window.parseInputNumber(formState.cotizacionDolar) || 1 };
            
            if (type === 'ventas') {
                dataToSave.isVentasLoaded = true;
                dataToSave.ventas = window.parseInputNumber(formState.ventas);
                dataToSave.ventasMañana = window.parseInputNumber(formState.ventasMañana);
                dataToSave.ventasTarde = Math.max(0, dataToSave.ventas - dataToSave.ventasMañana);
                dataToSave.objetivo = window.parseInputNumber(formState.objetivo);
                dataToSave.tickets = window.parseInputNumber(formState.tickets);
                dataToSave.ticketsMañana = window.parseInputNumber(formState.ticketsMañana);
                dataToSave.ticketsTarde = Math.max(0, dataToSave.tickets - dataToSave.ticketsMañana);
                dataToSave.productosVendidos = window.parseInputNumber(formState.productosVendidos);
            } else {
                dataToSave.isStockLoaded = true;
                const stockLimpio = formState.stock.filter(s => s.categoria).map(s => ({
                    categoria: s.categoria, cantidad: window.parseInputNumber(s.cantidad), valor: window.parseInputNumber(s.valor)
                }));
                dataToSave.stock = stockLimpio;
                dataToSave.valorMercaderia = stockLimpio.reduce((acc, item) => acc + item.valor, 0);
            }
            
            await setDoc(getDbDoc(docId), dataToSave, { merge: true });
            
            // Forzar actualización al nuevo período cargado
            selectedPeriod = `${formState.mes}-${formState.año}`;

            if(type === 'ventas') { formState.ventas=''; formState.ventasMañana=''; formState.objetivo=''; formState.tickets=''; formState.ticketsMañana=''; formState.productosVendidos=''; }
            else { formState.stock = [{ categoria: '', cantidad: '', valor: '' }]; }
            
            window.switchTab('historial');
        };

        window.deleteRecord = async (dbId) => { if(confirm('¿Seguro que deseas eliminar este registro histórico?')) await deleteDoc(getDbDoc(dbId)); };

        function getSortedPeriods() {
            const periods = Array.from(new Set(appData.map(d => `${d.mes}-${d.año}`)));
            return periods.map(p => {
                const [m, a] = p.split('-');
                const monthEntries = appData.filter(d => d.mes === m && d.año === a);
                const monthCap = monthEntries.reduce((acc, curr) => acc + (curr.valorMercaderia || 0), 0);
                const monthDol = monthEntries.reduce((max, curr) => Math.max(max, curr.cotizacionDolar || 0), 1);
                return { id: p, mes: m, año: a, capital: monthCap, dolar: monthDol };
            }).sort((a, b) => (a.año !== b.año) ? Number(b.año) - Number(a.año) : monthOrder[b.mes] - monthOrder[a.mes]);
        }

        function getDiagnosticData() {
            if (appData.length === 0 || !selectedPeriod) return null;
            const periods = getSortedPeriods();
            const currIdx = periods.findIndex(p => p.id === selectedPeriod);
            const [lastMonth, lastYear] = selectedPeriod.split('-');
            const prevPeriod = periods[currIdx + 1] || null;
            const [prevMonth, prevYear] = prevPeriod ? prevPeriod.id.split('-') : [null, null];
            
            const lastMonthData = appData.filter(d => d.mes === lastMonth && d.año === lastYear);
            const prevMonthData = prevPeriod ? appData.filter(d => d.mes === prevMonth && d.año === prevYear) : [];

            let tV = 0, tObj = 0, tT = 0, tP = 0, tM = 0, cotiz = 1;
            let tM_prev = 0, cotiz_prev = 1;
            let tT_manana = 0, tT_tarde = 0;
            let tV_manana = 0, tV_tarde = 0;
            const capPorCat = {};

            lastMonthData.forEach(d => {
                tM += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz) cotiz = Number(d.cotizacionDolar);
                if (d.puntoVenta !== 'deposito') { 
                    tV += (d.ventas || 0); tObj += (d.objetivo || 0); tT += (d.tickets || 0); tP += (d.productosVendidos || 0); 
                    tT_manana += (d.ticketsMañana || 0); tT_tarde += (d.ticketsTarde || 0);
                    tV_manana += (d.ventasMañana || 0); tV_tarde += (d.ventasTarde || 0);
                }
                if (d.stock) d.stock.forEach(i => { 
                    if(!capPorCat[i.categoria]) capPorCat[i.categoria] = {v:0, c:0}; 
                    capPorCat[i.categoria].v += i.valor; capPorCat[i.categoria].c += i.cantidad; 
                });
            });

            prevMonthData.forEach(d => {
                tM_prev += (Number(d.valorMercaderia) || 0);
                if (Number(d.cotizacionDolar) > cotiz_prev) cotiz_prev = Number(d.cotizacionDolar);
            });

            const momIndiv = Object.keys(PUNTOS_VENTA).map(key => {
                const cur = lastMonthData.find(d => d.puntoVenta === key);
                const pre = prevMonthData.find(d => d.puntoVenta === key);
                const isD = key === 'deposito';
                const vC_sales = cur ? (cur.ventas || 0) : 0;
                const vP_sales = pre ? (pre.ventas || 0) : 0;
                const vC_cap = cur ? (cur.valorMercaderia || 0) : 0;
                const vP_cap = pre ? (pre.valorMercaderia || 0) : 0;
                const growth = isD ? (vP_cap > 0 ? ((vC_cap-vP_cap)/vP_cap)*100 : 0) : (vP_sales > 0 ? ((vC_sales-vP_sales)/vP_sales)*100 : 0);
                return { key, nombre: PUNTOS_VENTA[key], vC_sales, vP_sales, vC_cap, vP_cap, growth, obj: cur?.objetivo || 0, tickets: cur?.tickets || 0, units: cur?.productosVendidos || 0, isDepo: isD };
            });

            return {
                lastMonthString: `${lastMonth} ${lastYear}`, prevMonthString: prevMonth ? `${prevMonth} ${prevYear}` : 'N/A',
                tV, tM, tM_prev, cotiz, cotiz_prev, cumplimiento: tObj > 0 ? (tV/tObj)*100 : 0, ticketPromedio: tT > 0 ? tV/tT : 0, unidadesTicket: tT > 0 ? tP/tT : 0,
                tT_manana, tT_tarde, tV_manana, tV_tarde, momIndiv, lastMonthData,
                catStats: Object.keys(capPorCat).map(k => ({name: k, val: capPorCat[k].v, avg: capPorCat[k].c > 0 ? capPorCat[k].v/capPorCat[k].c : 0})).sort((a,b)=>b.val-a.val)
            };
        }

        window.renderFormStockRows = () => {
            const container = document.getElementById('stock-rows-container');
            if(!container) return;
            const docId = `${formState.mes}-${formState.año}-${formState.puntoVenta}`;
            const currentRec = appData.find(d => d.dbId === docId);
            const isStockBlocked = currentRec && (currentRec.isStockLoaded || currentRec.valorMercaderia > 0);
            
            container.innerHTML = formState.stock.map((item, idx) => `
                <div class="flex gap-2 items-center">
                    <div class="flex-[2]"><input type="text" placeholder="Rubro" class="w-full p-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta ${isStockBlocked ? 'opacity-50 cursor-not-allowed' : ''}" value="${item.categoria}" onchange="handleStockChange(${idx}, 'categoria', this.value)" required ${isStockBlocked ? 'disabled' : ''} /></div>
                    <div class="flex-1"><input type="text" placeholder="Cant." class="w-full p-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-center text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta ${isStockBlocked ? 'opacity-50 cursor-not-allowed' : ''}" value="${item.cantidad}" onchange="handleStockChange(${idx}, 'cantidad', this.value)" required ${isStockBlocked ? 'disabled' : ''}/></div>
                    <div class="flex-[1.5] relative"><span class="absolute left-2 top-2 text-gray-400 text-sm">$</span><input type="text" placeholder="Valor" class="w-full pl-5 p-2 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 rounded-lg text-sm font-medium text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-brand-magenta ${isStockBlocked ? 'opacity-50 cursor-not-allowed' : ''}" value="${item.valor}" onchange="handleStockChange(${idx}, 'valor', this.value)" required ${isStockBlocked ? 'disabled' : ''}/></div>
                    ${formState.stock.length > 1 ? `<button type="button" onclick="removeStockRow(${idx})" class="p-2 text-red-400 hover:text-brand-magenta" ${isStockBlocked ? 'disabled' : ''}><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '<div class="w-8"></div>'}
                </div>
            `).join('');
            lucide.createIcons();
            const suma = formState.stock.reduce((acc, item) => acc + window.parseInputNumber(item.valor), 0);
            const el = document.getElementById('stock-sum-display');
            if(el) el.innerText = 'Total Automático: ' + formatCurrency(suma);
        };

        function render() {
            const main = document.getElementById('main-content');
            
            const tabVentas = document.getElementById('tab-cargaVentas');
            const tabStock = document.getElementById('tab-cargaStock');
            if(tabVentas) tabVentas.style.display = isAdmin ? 'flex' : 'none';

                            <div class="bg-white dark:bg-slate-950 p-6 rounded-xl border border-gray-200 dark:border-slate-800">
                                <div class="flex justify-between items-center mb-4"><div><h3 class="text-sm font-bold text-brand-black dark:text-white uppercase">Detalle Rubros</h3><p id="stock-sum-display" class="text-lg font-black text-brand-magenta">Total: $0,00</p></div><button type="button" onClick="addStockRow()" ${disabledAttr} class="bg-brand-gray text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-brand-black transition ${opacityClass}">+ Añadir Rubro</button></div>
                                <div id="stock-rows-container" class="space-y-2"></div>
                            </div>
                            <div class="flex justify-end"><button type="submit" ${disabledAttr} class="bg-brand-black text-white px-10 py-4 rounded-xl font-bold uppercase shadow-xl hover:bg-black transition ${opacityClass}">Guardar Stock</button></div>
                        </form>
                    </div>
                `;
                window.renderFormStockRows();
            } else {
                document.getElementById('export-btn-container').style.display = 'none';
                main.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden animate-in fade-in">
                        <div class="p-6 border-b border-gray-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 font-bold uppercase text-xs tracking-widest text-brand-gray">
                            Historial de Cargas
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead>
                                    <tr class="bg-white dark:bg-slate-900 text-brand-gray border-b border-gray-100 dark:border-slate-800">
                                        <th class="p-4">Período</th>
                                        <th class="p-4">Punto</th>
                                        <th class="p-4 text-right">Venta Total</th>
                                        <th class="p-4 text-right">Capital</th>
                                        ${isAdmin ? `<th class="p-4 text-center">Acción</th>` : ''}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${appData.slice().sort((a,b) => {
                                        if (a.año !== b.año) return Number(b.año) - Number(a.año);
                                        if (monthOrder[a.mes] !== monthOrder[b.mes]) return monthOrder[b.mes] - monthOrder[a.mes];
                                        return a.puntoVenta.localeCompare(b.puntoVenta);
                                    }).map(r=>`
                                    <tr class="border-b border-gray-50 dark:border-slate-800 hover:bg-brand-light dark:hover:bg-slate-800 transition-colors">
                                        <td class="p-4 font-bold text-brand-black dark:text-white">${r.mes} ${r.año}</td>
                                        <td class="p-4 text-brand-black dark:text-gray-300 font-bold">${PUNTOS_VENTA[r.puntoVenta]}</td>
                                        <td class="p-4 text-right font-bold text-brand-magenta">${r.isVentasLoaded || typeof r.ventas === 'number' ? formatCurrency(r.ventas) : '-'}</td>
                                        <td class="p-4 text-right font-bold text-brand-black dark:text-gray-300">${r.isStockLoaded || typeof r.valorMercaderia === 'number' ? formatCurrency(r.valorMercaderia) : '-'}</td>
                                        ${isAdmin ? `<td class="p-4 text-center"><button onclick="deleteRecord('${r.dbId}')" class="text-brand-gray hover:text-brand-magenta transition"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button></td>` : ''}
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function initCharts(d) {
            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? '#334155' : '#cbd5e1';
            const textColor = isDark ? '#878787' : '#878787';

            Chart.defaults.color = textColor;
            Chart.defaults.scale.grid.color = gridColor;
            Chart.defaults.scale.ticks.color = textColor;
            Chart.defaults.font.family = "'Nunito', sans-serif";

            const brandPalette = ['#EC008C', '#1D1D1B', '#878787', isDark ? '#475569' : '#cbd5e1'];

            const chartCfg = (id, type, data, options) => { 
                if (chartInstances[id]) chartInstances[id].destroy(); 
                const ctx = document.getElementById(id); 
                if (ctx) chartInstances[id] = new Chart(ctx.getContext('2d'), { type, data, options }); 
            };
            
            const locals = d.momIndiv.filter(m => !m.isDepo);

            if (document.getElementById('chartVentasMix')) {
                chartCfg('chartVentasMix', 'doughnut', { labels: locals.map(l=>l.nombre), datasets: [{ data: locals.map(l=>l.vC_sales), backgroundColor: brandPalette, borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartTurnos', 'doughnut', { labels: ['Mañana', 'Tarde'], datasets: [{ data: [d.tT_manana, d.tT_tarde], backgroundColor: ['#EC008C', '#1D1D1B'], borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartVentasTurno', 'doughnut', { labels: ['Ingresos Mañana', 'Ingresos Tarde'], datasets: [{ data: [d.tV_manana, d.tV_tarde], backgroundColor: ['#EC008C', '#1D1D1B'], borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: function(c) { return ' ' + formatCurrency(c.raw); } } } } });
                chartCfg('chartMomComercial', 'bar', { labels: locals.map(m=>m.nombre), datasets: [{ label: d.prevMonthString, data: locals.map(m=>m.vP_sales), backgroundColor: isDark ? '#334155' : '#cbd5e1', borderRadius: 4 }, { label: d.lastMonthString, data: locals.map(m=>m.vC_sales), backgroundColor: '#EC008C', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartUPT', 'bar', { labels: locals.map(l=>l.nombre), datasets: [{ data: locals.map(l=>l.tickets > 0 ? l.units/l.tickets : 0), backgroundColor: '#1D1D1B', borderRadius: 20 }] }, { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } });
                const yoyG = {}; appData.forEach(r => { if(r.puntoVenta!=='deposito'){ if(!yoyG[r.mes]) yoyG[r.mes]={name:r.mes}; yoyG[r.mes][r.año]=(yoyG[r.mes][r.año]||0)+(r.ventas||0); } });
                const yoyS = Object.values(yoyG).sort((a,b)=>monthOrder[a.name]-monthOrder[b.name]);
                const years = Array.from(new Set(appData.map(r=>r.año))).sort();
                chartCfg('chartYoy', 'bar', { labels: yoyS.map(y=>y.name), datasets: years.map((y,i)=>({ label:y, data:yoyS.map(it=>it[y]||0), backgroundColor: brandPalette[i % brandPalette.length], borderRadius:4 })) }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
            }

            if (document.getElementById('chartCapitalMix')) {
                chartCfg('chartCapitalMix', 'doughnut', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: brandPalette, borderWidth: 0 }] }, { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } });
                chartCfg('chartRubroAvg', 'bar', { labels: d.catStats.map(c=>c.name), datasets: [{ label: 'Valor Prom. Unidad', data: d.catStats.map(c=>c.avg), backgroundColor: '#EC008C', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
                chartCfg('chartMomCapital', 'bar', { labels: d.momIndiv.map(m=>m.nombre), datasets: [{ label: d.prevMonthString, data: d.momIndiv.map(m=>m.vP_cap), backgroundColor: isDark ? '#334155' : '#cbd5e1', borderRadius: 4 }, { label: d.lastMonthString, data: d.momIndiv.map(m=>m.vC_cap), backgroundColor: '#1D1D1B', borderRadius: 4 }] }, { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: formatAxis } } } });
            }
        }
        render();
    </script>
</body>
</html>
